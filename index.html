<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a2230">
<title>數碼對戰</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&family=Boogaloo&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#1a0a2e;overflow:hidden;}

/* ===== 全域 Clash Royale 風格 ===== */
#game{
  font-family:'Nunito','Arial Black',sans-serif;font-weight:900;
  background:linear-gradient(180deg,#2a1a5e 0%,#1a0e40 40%,#120a30 100%);
  color:#fff;width:100%;max-width:430px;height:100dvh;margin:0 auto;
  display:flex;flex-direction:column;overflow:hidden;
}
.screen{display:none;flex-direction:column;height:100%;}.screen.active{display:flex;}

/* ===== 怪獸展示區 ===== */
.top-zone{flex-shrink:0;display:flex;flex-direction:column;gap:8px;padding:8px 10px 0;}
.zone-monster{
  height:170px;border-radius:16px;overflow:hidden;position:relative;
  background:linear-gradient(180deg,#3a8a4a 0%,#226633 60%,#154422 100%);
  border:3px solid #5ad46a;
  box-shadow:0 6px 0 #0a3a15,inset 0 1px 0 rgba(150,255,150,0.3);
}
.zone-monster .lbg{position:absolute;inset:0;z-index:0;}
.mon-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.mon-sprite{width:88px;height:88px;animation:idle 1.2s ease-in-out infinite;image-rendering:auto;object-fit:contain;}
.mon-sprite.shake{animation:shake 0.4s ease-in-out;}
.mon-sprite.happy{animation:happy 0.5s ease-in-out 3;}
.fsv-div{width:74px;height:74px;display:block;}
.rs2-div{width:110px;height:110px;animation:idle 1.2s ease-in-out infinite;}
@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
@keyframes happy{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.mon-name{font-size:16px;color:#aaffbb;text-shadow:0 2px 6px #000;font-weight:900;}
.mon-stage{font-size:14px;color:#ffe844;text-shadow:0 2px 6px #000;font-weight:900;}
.warn-strip{position:absolute;bottom:5px;left:6px;right:6px;z-index:2;font-size:8px;text-align:center;padding:3px 5px;border-radius:4px;animation:bl2 1s step-end infinite;}
@keyframes bl2{0%,100%{opacity:1}50%{opacity:0.3}}
.wh{background:#2a1500;color:#ffaa44;border:1px solid #ff8822;}
.wm{background:#1a0a22;color:#ff88cc;border:1px solid #cc44aa;bottom:22px;}

/* ===== 狀態條 ===== */
.zone-stats{
  background:linear-gradient(180deg,#2a2060 0%,#1a1445 100%);
  border:2px solid #5544aa;border-radius:12px;padding:8px 12px;
  display:flex;flex-direction:column;gap:4px;
  box-shadow:0 4px 0 #0a0820;
}
.sr{display:flex;align-items:center;gap:6px;}
.sl{font-size:13px;color:#bbaaff;width:76px;flex-shrink:0;text-shadow:0 1px 3px #000;}
.sv{font-size:13px;width:58px;flex-shrink:0;text-align:right;text-shadow:0 1px 3px #000;}
.bw{flex:1;height:10px;background:#0a0820;border:1px solid #332266;border-radius:5px;overflow:hidden;}
.bf{height:100%;border-radius:5px;transition:width 0.5s;}
.hc{background:linear-gradient(90deg,#44ff88,#00cc55);}
.nc{background:linear-gradient(90deg,#ffaa22,#ff7700);}
.mc{background:linear-gradient(90deg,#ff88cc,#cc2288);}
.xc{background:linear-gradient(90deg,#4488ff,#0044dd);}
.sc{background:linear-gradient(90deg,#dd44ff,#8800cc);}
.sng{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:2px;}
.sb{
  background:linear-gradient(180deg,#3a2a80 0%,#221860 100%);
  border:2px solid #6655cc;border-radius:10px;padding:6px 2px;text-align:center;
  box-shadow:0 4px 0 #0a0820;
}
.sb .v{font-size:16px;color:#fff;margin-top:2px;text-shadow:0 2px 4px rgba(0,0,0,0.9);}
.sb .l{color:#9988cc;font-size:11px;}

/* ===== 內容區 & Tab ===== */
.content-zone{flex:1;overflow:hidden;padding:8px 10px 6px;position:relative;}
.tab-content{display:none;flex-direction:column;gap:7px;height:100%;overflow-y:auto;}
.tab-content.active{display:flex;}

/* ===== 底部導航 ===== */
.bot-nav{
  display:grid;grid-template-columns:repeat(4,1fr);gap:5px;
  padding:7px 10px 12px;
  background:linear-gradient(180deg,#1a1040 0%,#100830 100%);
  border-top:3px solid #5533aa;flex-shrink:0;
}
.nav-tab{
  font-family:'Nunito','Arial Black',sans-serif;font-weight:900;font-size:11px;
  background:linear-gradient(180deg,#2a1a60 0%,#1a1040 100%);
  color:#9977cc;border:2px solid #4433aa;border-radius:10px;
  padding:12px 2px;cursor:pointer;text-align:center;transition:all 0.12s;
  -webkit-tap-highlight-color:transparent;line-height:1.5;
  box-shadow:0 4px 0 #080420;
}
.nav-tab.active{
  background:linear-gradient(180deg,#6644dd 0%,#4422aa 100%);
  color:#fff;border-color:#9966ff;
  box-shadow:0 4px 0 #220088;
}
.nav-tab:active{transform:translateY(3px);box-shadow:0 1px 0 #080420;}

/* ===== 按鈕系統（Clash Royale 風） ===== */
.br{display:grid;grid-template-columns:1fr 1fr;gap:8px;}.br.s{grid-template-columns:1fr;}
button{
  font-family:'Nunito','Arial Black',sans-serif;font-weight:900;font-size:12px;padding:13px 8px;
  border-radius:10px;cursor:pointer;transition:transform 0.1s;border:none;
  background:linear-gradient(180deg,#5577ee 0%,#3355cc 100%);
  color:#fff;
  box-shadow:0 5px 0 #112299,0 0 0 2px #99aaff;
  line-height:1.4;-webkit-tap-highlight-color:transparent;width:100%;
  text-shadow:0 2px 3px rgba(0,0,0,0.6);
}
button:active{transform:translateY(4px);box-shadow:0 1px 0 #112299,0 0 0 2px #99aaff;}
button:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;
  background:linear-gradient(180deg,#333 0%,#222 100%);color:#666;}
button.g{
  background:linear-gradient(180deg,#55ee77 0%,#22aa44 100%);
  color:#fff;box-shadow:0 5px 0 #085520,0 0 0 2px #88ffaa;
}
button.g:active{box-shadow:0 1px 0 #085520,0 0 0 2px #88ffaa;}
button.y{
  background:linear-gradient(180deg,#ffcc22 0%,#dd8800 100%);
  color:#fff;box-shadow:0 5px 0 #885500,0 0 0 2px #ffee66;
}
button.y:active{box-shadow:0 1px 0 #885500,0 0 0 2px #ffee66;}
button.r{
  background:linear-gradient(180deg,#ee4444 0%,#cc1111 100%);
  color:#fff;box-shadow:0 5px 0 #660000,0 0 0 2px #ff9999;
}
button.r:active{box-shadow:0 1px 0 #660000,0 0 0 2px #ff9999;}
button.p{
  background:linear-gradient(180deg,#cc44ff 0%,#9911cc 100%);
  color:#fff;box-shadow:0 5px 0 #440077,0 0 0 2px #ee99ff;
}
button.p:active{box-shadow:0 1px 0 #440077,0 0 0 2px #ee99ff;}
button.gps-on{
  background:linear-gradient(180deg,#33ddaa 0%,#119966 100%);
  color:#fff;box-shadow:0 4px 0 #044422,0 0 0 1px #66ffcc;font-size:11px;
}
button.gps-on:active{box-shadow:0 1px 0 #044422,0 0 0 1px #66ffcc;}
button.ib{
  background:linear-gradient(180deg,#aa55ff 0%,#7722cc 100%);
  color:#fff;box-shadow:0 4px 0 #330077,0 0 0 2px #cc99ff;font-size:11px;padding:10px 6px;
}

/* ===== 訊息框、標題 ===== */
.mb{
  background:linear-gradient(180deg,#2a1a60 0%,#1a1044 100%);
  border:2px solid #5533cc;border-radius:10px;padding:8px 11px;
  font-size:13px;color:#ddd8ff;line-height:1.7;flex-shrink:0;
  box-shadow:0 3px 0 #0a0520;
}
.st{font-size:9px;color:#aa99ff;border-bottom:2px solid #4433aa;padding-bottom:5px;flex-shrink:0;}
.si{font-size:8px;color:#44ee88;text-align:right;padding:4px 10px 0;flex-shrink:0;}

/* ===== GPS 列 ===== */
.gps-bar{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(180deg,#0d2a1a 0%,#081a10 100%);
  border:2px solid #226633;border-radius:10px;padding:8px 12px;flex-shrink:0;
  box-shadow:0 3px 0 #041008;
}
.gps-dot{width:10px;height:10px;border-radius:50%;background:#334;flex-shrink:0;transition:background 0.3s;}
.gps-dot.searching{background:#ffaa22;animation:pulse 1s ease-in-out infinite;}
.gps-dot.active{background:#44ff88;}
.gps-dot.error{background:#ff4444;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.gps-info{flex:1;display:flex;flex-direction:column;gap:2px;}
.gps-status{font-size:12px;color:#88ccaa;}
.gps-meter{font-size:13px;color:#44ffaa;text-shadow:0 1px 3px #000;}
.gps-toggle-btn{
  font-family:'Nunito','Arial Black',sans-serif;font-weight:900;font-size:9px;padding:7px 10px;
  border-radius:8px;cursor:pointer;border:none;
  background:linear-gradient(180deg,#33aa66 0%,#1a7744 100%);
  color:#fff;box-shadow:0 3px 0 #084422,0 0 0 1px #66dd99;
  -webkit-tap-highlight-color:transparent;flex-shrink:0;transition:all 0.1s;width:auto;
}
.gps-toggle-btn:active{transform:translateY(2px);}
.gps-toggle-btn.on{
  background:linear-gradient(180deg,#11ee77 0%,#00aa44 100%);
  box-shadow:0 3px 0 #006622,0 0 0 1px #44ff99;
}

/* ===== 背包 ===== */
.bg-g{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;flex:1;min-height:0;}
.bc{
  background:linear-gradient(180deg,#2a1a60 0%,#1a1044 100%);
  border:2px solid #6644cc;border-radius:14px;padding:10px 8px;text-align:center;
  box-shadow:0 4px 0 #0a0420;display:flex;flex-direction:column;
  min-height:0;
}
.bi{font-size:36px;margin-bottom:4px;}
.bn{font-size:15px;color:#ddccff;margin-bottom:3px;font-weight:900;}
.bd{font-size:10px;color:#9988bb;line-height:1.3;margin-bottom:3px;}
.bct{font-size:12px;color:#ffe844;margin-bottom:5px;text-shadow:0 1px 3px #000;}

/* ===== 進化卡片 ===== */
.eg{display:grid;grid-template-columns:1fr;gap:8px;}
.ec{
  background:linear-gradient(180deg,#2a1a5a 0%,#1a1044 100%);
  border:2px solid #5533bb;border-radius:12px;padding:10px;
  cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 0 #0a0420;
}
.ec:active,.ec.sel{
  border-color:#ffcc22;
  background:linear-gradient(180deg,#3a2800 0%,#1a1400 100%);
  box-shadow:0 4px 0 #443300,0 0 10px rgba(255,200,0,0.3);
}
.ec .en{font-size:9px;color:#bbaaff;margin-top:4px;}
.ec .er{font-size:8px;color:#7766aa;margin-top:2px;}

/* ===== 對戰敵人按鈕 ===== */
.eb{
  font-family:'Nunito','Arial Black',sans-serif;font-weight:900;font-size:10px;
  background:linear-gradient(180deg,#2a1a5a 0%,#1a1044 100%);
  color:#ddd8ff;border:2px solid #5533bb;border-radius:10px;
  padding:11px 10px;cursor:pointer;text-align:left;width:100%;
  box-shadow:0 4px 0 #0a0420;-webkit-tap-highlight-color:transparent;
}
.eb:active{background:linear-gradient(180deg,#3a2870 0%,#221558 100%);transform:translateY(3px);}

/* ===== 封面 ===== */
#title-screen{
  background:linear-gradient(180deg,#2a1a5e 0%,#1a0e40 100%);
  align-items:center;justify-content:center;gap:18px;padding:30px 20px;
}
.gt{font-size:36px;color:#ffe844;letter-spacing:2px;line-height:1.5;text-align:center;
  font-weight:900;text-shadow:0 4px 8px rgba(0,0,0,0.9),0 0 30px rgba(255,220,0,0.5),-2px -2px 0 #aa7700,2px -2px 0 #aa7700;}

/* ===== 圖鑑 ===== */
.blink{animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.dex-card{
  background:linear-gradient(180deg,#2a1a5a 0%,#1a1044 100%);
  border:2px solid #5533bb;border-radius:10px;padding:8px;
  text-align:center;cursor:pointer;transition:all 0.12s;-webkit-tap-highlight-color:transparent;
  box-shadow:0 3px 0 #0a0420;
}
.dex-card:active{border-color:#ffe844;background:linear-gradient(180deg,#2a1e00 0%,#1a1200 100%);}
.dex-card.owned{border-color:#22aa55;}
.dex-card .dname{font-size:11px;color:#bbaaff;margin-top:4px;}
.dex-card .dstage{font-size:10px;color:#7766aa;margin-top:1px;}

/* ===== 對戰畫面 ===== */
#battle-screen{background:linear-gradient(180deg,#1a0e40 0%,#100830 100%);padding:10px;gap:8px;}
.ba{flex:0 0 195px;border:3px solid #5533aa;border-radius:12px;position:relative;overflow:hidden;box-shadow:0 6px 0 #220066;}
.abg{position:absolute;inset:0;z-index:0;}
.fw{position:absolute;bottom:22px;display:flex;flex-direction:column;align-items:center;gap:3px;z-index:2;}
#fw-my{left:8px;}#fw-en{right:8px;}
.fsv{width:74px;height:74px;display:block;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.7));}
#fw-en .fsv{transform:scaleX(-1);}
.fl{font-size:8px;color:#fff;text-shadow:1px 1px 3px #000;white-space:nowrap;}
.hs{width:74px;height:7px;background:#0a0a0a;border:1px solid #448844;border-radius:4px;overflow:hidden;margin-bottom:1px;}
.ss2{width:74px;height:4px;background:#0a0a1a;border:1px solid #8822aa;border-radius:3px;overflow:hidden;}
.hi{height:100%;border-radius:4px;transition:width 0.4s;}
.mh{background:linear-gradient(90deg,#44ff88,#00cc44);}.eh{background:linear-gradient(90deg,#ff5544,#cc2200);}
.si2{height:100%;border-radius:3px;background:linear-gradient(90deg,#dd44ff,#9900cc);transition:width 0.4s;}
.efx{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:46px;opacity:0;z-index:3;}
@keyframes sa{0%{opacity:1;transform:scale(0.5) rotate(-20deg)}50%{opacity:1;transform:scale(1.4)}100%{opacity:0;transform:scale(2)}}
@keyframes ba2{0%{opacity:1;transform:scale(0.3)}40%{opacity:1;transform:scale(1.6)}100%{opacity:0;transform:scale(2.4)}}
@keyframes spa{0%{opacity:1;transform:scale(0.2) rotate(0)}50%{opacity:1;transform:scale(1.4) rotate(180deg)}100%{opacity:0;transform:scale(2.2) rotate(360deg)}}
@keyframes ha{0%{opacity:1;transform:translateX(0)}50%{opacity:1;transform:translateX(18px) scale(1.3)}100%{opacity:0;transform:translateX(36px)}}
@keyframes mya{0%,100%{transform:translateX(0)}50%{transform:translateX(24px)}}
@keyframes ena{0%,100%{transform:translateX(0)}50%{transform:translateX(-24px)}}
@keyframes hf{0%,100%{opacity:1}30%,70%{opacity:0.1}}
.bl{
  background:linear-gradient(180deg,#0d0820 0%,#080515 100%);
  border:2px solid #4422aa;border-radius:8px;
  padding:6px 9px;font-size:12px;color:#ccbbff;
  height:70px;overflow-y:auto;line-height:2;white-space:pre-wrap;flex-shrink:0;
}
.bbt{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0;}
.bbt button{font-size:12px;padding:13px 6px;}

/* ===== 結果畫面 ===== */
#result-screen{
  background:linear-gradient(180deg,#1a0e40 0%,#100830 100%);
  align-items:center;justify-content:center;padding:24px 16px;gap:14px;
}
.rt{font-size:16px;letter-spacing:2px;text-shadow:0 3px 6px rgba(0,0,0,0.8);}
.rw{color:#88ffaa;}.rl{color:#ff8888;}
.rs2{width:110px;height:110px;animation:idle 1.2s ease-in-out infinite;}
.rst{
  background:linear-gradient(180deg,#2a1a5a 0%,#1a1044 100%);
  border:2px solid #5533bb;border-radius:10px;
  padding:12px;font-size:13px;color:#ccbbff;line-height:2.4;width:100%;
  box-shadow:0 4px 0 #0a0420;
}
</style>

</head>
<body>
<div id="game">

<div id="title-screen" class="screen active">
  <div class="gt">數碼<br>對戰</div>
  <div id="title-pichu" style="animation:idle 1.2s ease-in-out infinite;width:96px;height:96px;display:flex;align-items:center;justify-content:center;"></div>
  <div id="save-status" style="font-size:9px;color:#44aa44;"></div>
  <button class="g" onclick="goToName()" style="font-size:14px;padding:16px;max-width:240px;">▶ 開始遊戲</button>
  <button id="new-game-confirm" onclick="newGame()" style="font-size:10px;padding:10px;color:#ffee44;max-width:240px;">↺ 重新開始</button>
  <div style="font-size:9px;color:#445566;">v0.36</div>
</div>

<!-- 命名畫面 -->
<div id="name-screen" class="screen" style="background:linear-gradient(180deg,#2a1a5e 0%,#1a0e40 100%);align-items:center;justify-content:center;gap:20px;padding:30px 20px;">
  <div style="font-size:16px;color:#ffe844;font-weight:900;letter-spacing:2px;text-align:center;line-height:2;text-shadow:0 2px 6px #000;">幫你的<br>數碼獸取名</div>
  <div id="name-pichu" style="animation:idle 1.2s ease-in-out infinite;width:96px;height:96px;display:flex;align-items:center;justify-content:center;"></div>
  <div style="width:100%;max-width:280px;display:flex;flex-direction:column;gap:10px;">
    <input id="pet-name-input" type="text" maxlength="8" placeholder="輸入名字（最多8字）"
      style="font-family:'Nunito','Arial Black',sans-serif;font-weight:900;font-size:14px;background:linear-gradient(180deg,#2a1a60 0%,#1a1044 100%);color:#fff;border:2px solid #6644cc;border-radius:12px;padding:16px 14px;width:100%;outline:none;text-align:center;box-shadow:0 4px 0 #0a0420;"
      oninput="checkName()"/>
    <div id="name-hint" style="font-size:12px;color:#8877bb;text-align:center;font-weight:900;">不填就用預設名字</div>
  </div>
  <button class="g" id="name-confirm-btn" onclick="confirmName()" style="font-size:13px;padding:14px;max-width:240px;width:100%;">✓ 確認，出發！</button>
</div>

<div id="main-screen" class="screen">
  <div class="top-zone">
    <div class="si" id="save-status2">✓ 自動存檔</div>
    <div class="zone-monster">
      <svg class="lbg" viewBox="0 0 300 170" preserveAspectRatio="xMidYMid slice" id="lcd-bg-svg"></svg>
      <div class="mon-inner">
        <div class="mon-stage" id="stage-label">幼年期I</div>
        <div id="my-sprite" class="mon-sprite"></div>
        <div class="mon-name" id="my-name">巴達獸</div>
      </div>
      <div id="warn-hunger" class="warn-strip wh" style="display:none;">⚠ 肚子餓了！快去背包餵食！</div>
      <div id="warn-mood" class="warn-strip wm" style="display:none;">⚠ 心情很差！玩耍或餵糖果！</div>
    </div>
    <div class="zone-stats">
      <div class="sr"><span class="sl">生命值</span><div class="bw"><div class="bf hc" id="hp-bar" style="width:100%"></div></div><span class="sv" id="hp-text" style="color:#88ffaa;font-size:10px;"></span></div>
      <div class="sr"><span class="sl">飽食度</span><div class="bw"><div class="bf nc" id="hunger-bar" style="width:80%"></div></div><span class="sv" id="hunger-text" style="color:#ffaa22;font-size:10px;"></span></div>
      <div class="sr"><span class="sl">心情值</span><div class="bw"><div class="bf mc" id="mood-bar" style="width:80%"></div></div><span class="sv" id="mood-text" style="color:#ff88cc;font-size:10px;"></span></div>
      <div class="sr"><span class="sl">經驗值</span><div class="bw"><div class="bf xc" id="xp-bar" style="width:0%"></div></div><span class="sv"></span></div>
      <div class="sr"><span class="sl">必殺能量</span><div class="bw" style="background:#1a0a2a;border-color:#6622aa;"><div class="bf sc" id="sp-bar" style="width:0%"></div></div><span class="sv" id="sp-text" style="color:#cc88ff;font-size:10px;"></span></div>
      <div class="sng">
        <div class="sb"><div class="l">等級</div><div class="v" id="stat-lv">1</div></div>
        <div class="sb"><div class="l">攻擊</div><div class="v" id="stat-atk">8</div></div>
        <div class="sb"><div class="l">勝場</div><div class="v" id="stat-win">0</div></div>
        <div class="sb"><div class="l">公尺</div><div class="v" id="stat-steps">0</div></div>
      </div>
    </div>
  </div>

  <div class="content-zone" style="position:relative;">

    <!-- 狀態 tab -->
    <div id="tab-status" class="tab-content active">
      <!-- GPS 狀態列 -->
      <div class="gps-bar">
        <div class="gps-dot" id="gps-dot"></div>
        <div class="gps-info">

// Sprite 顯示函式：產生 CSS background-position 字串
function spriteStyle(id,size=88){
  const m=MONS[id];if(!m)return'';
  const scale=size/Math.max(m.sw,m.sh);
  const bw=Math.round(IMG_W*scale);
  const bh=Math.round(IMG_H*scale);
  const bx=Math.round(-m.sx*scale);
  const by=Math.round(-m.sy*scale);
  const dw=Math.round(m.sw*scale);
  const dh=Math.round(m.sh*scale);
  return `width:${dw}px;height:${dh}px;background:#1a2a1a url('${IMG_SRC}') ${bx}px ${by}px / ${bw}px ${bh}px no-repeat;display:inline-block;image-rendering:pixelated;`;
}

function setSpriteEl(el,id,size=88){
  if(!el)return;
  const m=MONS[id];if(!m){el.style.background='#1a2a1a';return;}
  const scale=size/Math.max(m.sw,m.sh);
  const bw=Math.round(IMG_W*scale);
  const bh=Math.round(IMG_H*scale);
  const bx=Math.round(-m.sx*scale);
  const by=Math.round(-m.sy*scale);
  const dw=Math.round(m.sw*scale);
  const dh=Math.round(m.sh*scale);
  el.style.width=dw+'px';
  el.style.height=dh+'px';
  el.style.backgroundImage='url("'+IMG_SRC+'")';
  el.style.backgroundPosition=bx+'px '+by+'px';
  el.style.backgroundSize=bw+'px '+bh+'px';
  el.style.backgroundRepeat='no-repeat';
  el.style.display='inline-block';
  el.style.imageRendering='auto';
}

// ===== GPS 追蹤系統 =====
const MAX_SPEED_MPS = 20000/3600; // 20 km/h → m/s（超過就過濾）
let gpsWatchId=null, lastPos=null, gpsRunning=false, sessionMeters=0;

function gpsDistMeters(lat1,lon1,lat2,lon2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function toggleGPS(){
  if(gpsRunning){stopGPS();G.gpsOn=false;}
  else{startGPS();G.gpsOn=true;}
  sv();
}

function startGPS(){
  if(!navigator.geolocation){
    setGPSUI('error','GPS 不支援','此裝置無法使用 GPS');
    return;
  }
  setGPSUI('searching','定位中...','等待 GPS 訊號...');
  gpsWatchId=navigator.geolocation.watchPosition(
    onGPSSuccess,
    onGPSError,
    {enableHighAccuracy:true, maximumAge:5000, timeout:15000}
  );
  gpsRunning=true;
  document.getElementById("gps-toggle-btn").textContent="關閉";
  document.getElementById("gps-toggle-btn").classList.add("on");
}

function stopGPS(){
  if(gpsWatchId!==null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;}
  gpsRunning=false;lastPos=null;
  setGPSUI('off','GPS 已關閉','今日：'+(G.dailySteps||0)+' / '+(G.dailyGoal||500)+' 公尺');
  document.getElementById("gps-toggle-btn").textContent="開啟";
  document.getElementById("gps-toggle-btn").classList.remove("on");
}

// 每日步數重置
function todayStr(){const d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function checkDailyReset(){
  const today=todayStr();
  if(G.lastStepDate!==today){
    G.dailySteps=0;
    G.lastStepDate=today;
    sv();
  }
}
// 本世代步數（進化條件用）
function genSteps(){return G.steps;} // 進化時完全清零，所以直接用 G.steps

function onGPSSuccess(pos){
  const {latitude:lat,longitude:lon,accuracy} = pos.coords;
  const now=Date.now();

  // 精度太差（> 50公尺誤差）跳過
  if(accuracy>50){
    setGPSUI('searching','訊號弱（精度'+Math.round(accuracy)+'m）','等待更好訊號...');
    return;
  }
  setGPSUI('active','GPS 運作中（精度'+Math.round(accuracy)+'m）','今日：'+(G.dailySteps||0)+' / '+(G.dailyGoal||500)+' 公尺');

  if(lastPos){
    const dist=gpsDistMeters(lastPos.lat,lastPos.lon,lat,lon);
    const timeSec=(now-lastPos.time)/1000;
    const speed=timeSec>0?dist/timeSec:0;

    // 速度過濾：超過 10 km/h 不計算
    if(speed<=MAX_SPEED_MPS && dist>=1){
      const meters=Math.round(dist);
      G.steps+=meters;
      G.dailySteps=(G.dailySteps||0)+meters;
      checkDailyReset();
      sessionMeters+=meters;
      // 每 100 公尺加一點 XP 和心情
      const xpGain=Math.floor(meters/10);
      const moodGain=Math.floor(meters/50);
      if(xpGain>0){G.xp+=xpGain;bEl();}
      if(moodGain>0)G.mood=Math.min(100,G.mood+moodGain);
      G.sp=Math.min(SPM,G.sp+Math.floor(meters/200));
      rf();
      document.getElementById("gps-meter").textContent='今日：'+G.dailySteps+' / '+G.dailyGoal+' 公尺（+'+meters+'m）';
      if(G.dailySteps>=G.dailyGoal && G.dailySteps-meters<G.dailyGoal){bagMsg('🎉 今日目標達成！+10 EXP 獎勵！');G.xp+=10;rf();}
      sv();
    }
  }
  lastPos={lat,lon,time:now};
}

function onGPSError(err){
  const msgs={1:'請允許定位權限',2:'無法取得位置',3:'GPS 逾時'};
  setGPSUI('error',msgs[err.code]||'GPS 錯誤','請檢查設定後重試');
  gpsRunning=false;
  document.getElementById("gps-toggle-btn").textContent="開啟";
  document.getElementById("gps-toggle-btn").classList.remove("on");
}

function setGPSUI(state,status,meter){
  const dot=document.getElementById("gps-dot");

  document.getElementById("gps-status").textContent=status;

}

// ===== 時間消耗 =====
function dec(){
  const now=Date.now(),h=Math.min((now-G.lastSeen)/3600000,24);
  if(h<0.05)return null;
  const hl=Math.round(h*HPH),ml=Math.round(h*MPH);
  G.hunger=Math.max(0,G.hunger-hl);
  G.mood=Math.max(0,G.mood-ml);
  // 飽食度夠時：HP緩慢回覆，同時消耗飽食度
  if(G.hunger>20 && G.hp<G.maxHp){
    const hpRegen=Math.round(h*HP_REGEN_PER_HOUR);
    const hungerCost=Math.round(h*HUNGER_FOR_REGEN);
    G.hp=Math.min(G.maxHp, G.hp+hpRegen);
    G.hunger=Math.max(0, G.hunger-hungerCost);
  }
  // 飽食度歸0：HP開始下降
  if(G.hunger===0) G.hp=Math.max(1,G.hp-Math.round(h*HPHP));
  G.lastSeen=now;
  return{mins:Math.round(h*60),hl,ml};
}

// 時間恢復設定（分鐘）
const REFILL_MINS={meat:0,snack:0,potion:90,vitamin:180}; // 分鐘
const STACK_ITEMS=['potion','vitamin']; // 可累積的道具
const STACK_MAX=5; // 最大庫存

// 初始化庫存
function initStacks(){
  if(!G.itemStacks) G.itemStacks={potion:1,vitamin:1};
  if(!G.stackLastGain) G.stackLastGain={potion:Date.now(),vitamin:Date.now()};
}

// 計算並更新道具累積
function tickStacks(){
  initStacks();
  const now=Date.now();
  STACK_ITEMS.forEach(k=>{
    const coolMs=REFILL_MINS[k]*60*1000;
    const elapsed=now-(G.stackLastGain[k]||now);
    const gained=Math.floor(elapsed/coolMs);
    if(gained>0){
      G.itemStacks[k]=Math.min(STACK_MAX,(G.itemStacks[k]||0)+gained);
      G.stackLastGain[k]=(G.stackLastGain[k]||now)+gained*coolMs;
    }
  });
}

// 取得剩餘時間（下一個補充還要多久）
function getStackStatus(k){
  initStacks();
  tickStacks();
  const count=G.itemStacks[k]||0;
  const coolMs=REFILL_MINS[k]*60*1000;
  if(count>=STACK_MAX) return{count,remaining:0,full:true};
  const elapsed=Date.now()-(G.stackLastGain[k]||Date.now());
  const remaining=Math.max(0,Math.ceil((coolMs-elapsed)/60000));
  return{count,remaining,full:false};
}
const ITEM_CFG={
  meat: {name:"烤肉",   icon:"🍖",desc:"飽食度+50"},
  snack:{name:"糖果",   icon:"🍬",desc:"心情+40"},
  potion:{name:"急救藥",icon:"💊",desc:"HP恢復50%"},
  vitamin:{name:"經驗可樂",icon:"🥤",desc:"EXP+30"},
};
function getRefillStatus(k){
  const coolMs=REFILL_MINS[k]*60*1000;
  if(coolMs===0)return{ready:true,remaining:0}; // 無冷卻
  const lastMs=G.lastRefill[k]||0;
  const elapsed=Date.now()-lastMs;
  const ready=elapsed>=coolMs;
  const remaining=Math.max(0,Math.ceil((coolMs-elapsed)/60000));
  return{ready,remaining};
}
function bBag(){
  const el=document.getElementById("bag-grid");if(!el)return;el.innerHTML="";

    const btnsEl=document.getElementById('room-btns');

    let tries=0;
    const check=setInterval(()=>{
      tries++;
      if(window._fb && window._fb.db){
        clearInterval(check);
        if(loadEl)loadEl.style.display='none';
        if(btnsEl){btnsEl.style.opacity='1';btnsEl.style.pointerEvents='auto';}
        const fbSt2=document.getElementById('fb-state');

function sendOnlineAction(action){

  const {db, ref, set} = window._fb;
  set(ref(db, 'rooms/' + ROOM + '/action'), {

  });

}

// 處理回合
function handleOnlineTurn(data){
  if(!B || !B.online || B.over || B.busy) return;
  if(data.status !== 'resolving') return;
  const action = data.action;
  if(!action) return;

  B.busy = true;
  const isMyAction = action.by === MY_SLOT;
  const p1 = data.p1, p2 = data.p2;
  const my = MY_SLOT==='p1' ? p1 : p2;
  const en = MY_SLOT==='p1' ? p2 : p1;

  const myAtk = my?.atk || mn().atk;
  const enAtk = en?.atk || 30;

  let dmgToEn = 0, dmgToMe = 0;

  if(action.type === 'attack'){
    dmgToEn = Math.max(1, myAtk - Math.floor(Math.random()*5));
    dmgToMe = Math.max(1, enAtk - Math.floor(Math.random()*5));
  } else if(action.type === 'special'){
    dmgToEn = Math.max(1, Math.floor(myAtk * 1.8) - Math.floor(Math.random()*8));
    dmgToMe = Math.max(1, Math.floor(enAtk * 0.5));
  }

  B.eHp = Math.max(0, B.eHp - dmgToEn);
  B.mHp = Math.max(0, B.mHp - dmgToMe);

  document.getElementById('my-hp-inner').style.width = Math.round(B.mHp/B.mMaxHp*100)+'%';
  document.getElementById('en-hp-inner').style.width = Math.round(B.eHp/B.eMaxHp*100)+'%';

  blog((isMyAction?'你':'對手') + '出招！');
  if(dmgToEn>0) blog('對方受到 ' + dmgToEn + ' 傷害');
  if(dmgToMe>0) blog('你受到 ' + dmgToMe + ' 傷害');

  // 判斷勝負
  const {db, ref, set} = window._fb;
  if(B.mHp <= 0 || B.eHp <= 0){
    const winner = B.eHp<=0 ? MY_SLOT : (MY_SLOT==='p1'?'p2':'p1');
    set(ref(db,'rooms/'+ROOM+'/status'), 'ended');
    set(ref(db,'rooms/'+ROOM+'/winner'), winner);
  } else {
    // 換手
    const nextTurn = data.turn === 'p1' ? 'p2' : 'p1';
    set(ref(db,'rooms/'+ROOM+'/turn'), nextTurn);
    set(ref(db,'rooms/'+ROOM+'/status'), 'battle');
    set(ref(db,'rooms/'+ROOM+'/action'), null);
    setTimeout(()=>{ B.busy=false; updateOnlineBtns(nextTurn); }, 500);
  }
}

// 對戰結束
function handleOnlineEnd(data){
  if(!B || B.over) return;
  B.over = true;
  const win = data.winner === MY_SLOT;
  blog(win ? '🎉 你贏了！' : '💀 你輸了...');
  G.wins += win ? 1 : 0;
  G.xp += win ? 30 : 5;
  sv();
  setTimeout(()=>{
    document.getElementById('battle-screen').classList.remove('active');
    document.getElementById('main-screen').classList.add('active');
    leaveRoom();
    showTab('battle');
    rf();
  }, 2500);
}

function openDex(){
  const screen=document.getElementById('dex-screen');

function buildDexList(){
  document.getElementById('dex-list').style.display='block';
  document.getElementById('dex-detail').style.display='none';
  document.getElementById('dex-title').textContent='圖鑑（'+DEX_ALL.length+'隻）';
  const el=document.getElementById('dex-list');
  el.innerHTML='';

  // 按階段分組顯示
  const stages=[
    {label:'幼年期', keys:['pichu']},
    {label:'成長期', keys:['elekid','pikachu','taillow']},
    {label:'成熟期', keys:['tyrunt','electabuzz','pachirisu','dedenne','emolga','fletchling','murkrow']},
    {label:'完全體', keys:['tyrantrum','electivire','togekiss','raichu','altaria','talonflame','honchkrow']},
    {label:'究極體', keys:['tyranitarex','superelectivire','supertogekiss','superraichu','zapdos','moltres','darkrai']},
  ];

  stages.forEach(({label,keys})=>{
    const sDiv=document.createElement('div');
    sDiv.style.cssText='margin-bottom:10px;';
    sDiv.innerHTML=`<div style="font-size:9px;color:#6688aa;border-bottom:1px solid #2a3a50;padding-bottom:4px;margin-bottom:6px;">${label}</div>`;
    const grid=document.createElement('div');
    grid.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:6px;';
    keys.forEach(k=>{
      const mo=MONS[k]; if(!mo) return;
      const card=document.createElement('div');
      card.className='dex-card';
      const sprDiv=document.createElement('div');
      setSpriteEl(sprDiv,k,56);
      sprDiv.style.margin='0 auto';
      card.appendChild(sprDiv);
      card.innerHTML+=`<div class="dname">${mo.name}</div><div class="dstage">${mo.type}</div>`;
      card.onclick=()=>showDexDetail(k);
      grid.appendChild(card);
    });
    sDiv.appendChild(grid);
    el.appendChild(sDiv);
  });
}

function bEl(){
  const el=document.getElementById("evo-list");
  el.innerHTML="";
  el.style.gridTemplateColumns="1fr";
  const ps=EP[G.monId]||[];
  if(!ps.length){
    el.innerHTML='<div style="font-size:11px;color:#446688;text-align:center;padding:18px;">已達最終形態</div>';
    document.getElementById("evo-btn").disabled=true;
    m("evo-msg","已是最強形態！");return;
  }
  let anyReady=false;
  ps.forEach(({id:pid,check})=>{
    const pm=MONS[pid];
    const ready=check();
    if(ready)anyReady=true;
    const conds=getConditions(pid);
    const c=document.createElement("div");
    c.className="ec"+(ready?" sel":"");
    c.style.opacity=ready?"1":"0.82";

    // 條件列表 HTML
    let condHTML="";
    conds.forEach(({label,cur,tgt,done,special,note})=>{
      const pct=special?100:Math.min(100,Math.round(Number(cur)/Number(tgt)*100));
      const barCol=done?"#44ff88":"#1e3a50";
      const col=done?"color:#88ffaa;":"color:#6688aa;";
      const fw=done?"font-weight:600;":"";
      const tick=done?'<span style="color:#44ff88;margin-right:3px;">✓</span>':'<span style="color:#334455;margin-right:3px;">○</span>';
      const valText=special?(done?"達成":(note||cur+"次")):cur+"/"+tgt;
      condHTML+=`<div style="margin-top:6px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:10px;${fw}${col}">${tick}${label}</span>
          <span style="font-size:10px;${fw}${col}">${valText}</span>
        </div>
        ${special?"":`<div style="margin-top:3px;height:5px;background:#0a1418;border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${barCol};border-radius:3px;transition:width 0.4s;"></div>
        </div>`}
      </div>`;
    });

    // 卡片主體
    const card=document.createElement("div");
    card.style.cssText="display:flex;align-items:flex-start;gap:12px;text-align:left;";

    // 怪獸縮圖
    const sprWrap=document.createElement("div");
    sprWrap.style.cssText="flex-shrink:0;margin-top:2px;";
    const sprEl=document.createElement("div");
    setSpriteEl(sprEl,pid,64);
    sprWrap.appendChild(sprEl);
    card.appendChild(sprWrap);

    // 文字區
    const info=document.createElement("div");
    info.style.cssText="flex:1;";
    info.innerHTML=`
      <div style="font-size:12px;color:${ready?"#88ffaa":"#88ccff"};${ready?"font-weight:600;":""}">${pm.name}</div>
      <div style="font-size:10px;color:${ready?"#44ffaa":"#4a6a80"};margin-top:3px;">${ready?"★ 條件全部達成！":"進化條件"}</div>
      ${condHTML}`;
    card.appendChild(info);
    c.appendChild(card);

    c.onclick=()=>{
      if(!ready)return;
      document.querySelectorAll(".ec").forEach(x=>x.classList.remove("sel"));
      c.classList.add("sel");
      c.dataset.pid=pid;
      document.getElementById("evo-btn").disabled=false;
    };
    if(ready) c.dataset.pid=pid;
    el.appendChild(c);
  });
  m("evo-msg",anyReady?"條件達成！點選目標後按進化！":"繼續培育，達成條件後才能進化");
  document.getElementById("evo-btn").disabled=true;
}

function doEvolve(){
  const sel=document.querySelector(".ec.sel");if(!sel){m("evo-msg","請先選擇目標！");return;}
  const ps=EP[G.monId];
  const cards=Array.from(document.querySelectorAll(".ec"));
  const idx=cards.indexOf(sel);
  const tid=ps[idx].id;
  const tm=MONS[tid];
  G.monId=tid;G.hp=tm.hp;G.maxHp=tm.hp;G.xp=0;G.hunger=80;G.mood=90;G.steps=0;G.stepBase=0;
  showTab("status");
  const displayName=G.petName||tm.name;
  m("status-msg","恭喜！「"+displayName+"」進化為 "+tm.name+"！");
  rf();bEn();bEl();sv();
}
