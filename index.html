<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2e3a4a">
<title>數碼對戰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#1a2230;}
body{display:flex;justify-content:center;align-items:flex-start;padding:12px 0;min-height:100vh;}
#game{font-family:'Press Start 2P',monospace;font-size:12px;background:#2e3a4a;color:#e8f0ff;width:100%;max-width:420px;min-height:100vh;padding:16px;user-select:none;}
.screen{display:none;flex-direction:column;gap:12px;}.screen.active{display:flex;}
.lcd{border:3px solid #4a7a4a;border-radius:8px;padding:12px;text-align:center;min-height:148px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:relative;overflow:hidden;}
.lcd-bg{position:absolute;inset:0;z-index:0;}
.lcd-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.mon-display{width:88px;height:88px;animation:idle 1.2s ease-in-out infinite;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.6));}
@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.mon-display.shake{animation:shake 0.4s ease-in-out;}
.mon-display.happy{animation:happy 0.5s ease-in-out 3;}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
@keyframes happy{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.name-tag{font-size:11px;color:#88ffaa;}
.stage-tag{font-size:9px;color:#ffcc44;}
.stat-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.stat-row-label{font-size:9px;color:#99bbff;width:68px;flex-shrink:0;}
.stat-row-val{font-size:8px;width:46px;flex-shrink:0;text-align:right;}
.bar-wrap{flex:1;height:9px;background:#0f1a0f;border:1px solid #4a7a4a;border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width 0.5s;}
.hp-c{background:#44ff88;}.xp-c{background:#4488ff;}.sp-c{background:#cc44ff;}.hunger-c{background:#ffaa22;}.mood-c{background:#ff88cc;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;text-align:center;}
.stat-box{background:#1e2e40;border:1px solid #2a3a55;border-radius:5px;padding:5px 3px;}
.stat-box .val{font-size:11px;color:#fff;margin-top:3px;}
.stat-box .lbl{color:#88aacc;font-size:8px;}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}.btn-row.single{grid-template-columns:1fr;}
button{font-family:'Press Start 2P',monospace;font-size:11px;padding:12px 8px;border-radius:8px;cursor:pointer;transition:all 0.12s;border:none;background:#2255aa;color:#fff;box-shadow:0 4px 0 #0a2255,0 0 0 2px #4488dd;line-height:1.4;-webkit-tap-highlight-color:transparent;}
button:hover{background:#3366cc;transform:translateY(-1px);}
button:active{transform:translateY(3px);}
button:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;background:#1a2a3a;color:#667788;}
button.danger{background:#992222;color:#ffdddd;box-shadow:0 4px 0 #440000,0 0 0 2px #dd4444;}
button.danger:hover{background:#bb3333;}
button.success{background:#226633;color:#ccffdd;box-shadow:0 4px 0 #0a2211,0 0 0 2px #44bb66;}
button.success:hover{background:#2d8844;}
button.sp-btn{background:#551188;color:#ee99ff;box-shadow:0 4px 0 #220044,0 0 0 2px #aa44ff;}
button.sp-btn:hover{background:#771199;}
button.action-btn{background:#1a3355;color:#ffee44;box-shadow:0 4px 0 #0a1a2a,0 0 0 2px #ffcc22;}
button.action-btn:hover{background:#224466;color:#ffff88;transform:translateY(-1px);}
button.item-btn{background:#2a1a3a;color:#ffccff;box-shadow:0 4px 0 #110822,0 0 0 2px #cc66ff;font-size:10px;padding:9px 6px;}
button.item-btn:hover{background:#3a2a4a;transform:translateY(-1px);}
.msg-box{background:#1a2a3a;border:2px solid #2a4060;border-radius:6px;padding:9px 11px;font-size:10px;color:#cce0ff;min-height:40px;line-height:2;}
.section-title{font-size:10px;color:#7799bb;border-bottom:1px solid #2a3a50;padding-bottom:5px;}
.nav-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.nav-tab{font-family:'Press Start 2P',monospace;font-size:9px;background:#1a2a3a;color:#aabbcc;border:2px solid #2a3a50;border-radius:6px;padding:8px 3px;cursor:pointer;text-align:center;transition:all 0.12s;-webkit-tap-highlight-color:transparent;}
.nav-tab.active{background:#1a3a5a;color:#fff;border-color:#4488cc;}
.nav-tab:hover{color:#fff;}
.warn-bar{font-size:9px;text-align:center;padding:6px;border-radius:6px;animation:blink2 1s step-end infinite;}
@keyframes blink2{0%,100%{opacity:1}50%{opacity:0.4}}
.warn-hunger{background:#2a1500;color:#ffaa44;border:1px solid #ff8822;}
.warn-mood{background:#1a0a22;color:#ff88cc;border:1px solid #cc44aa;}
.bag-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bag-card{background:#1a2a3a;border:2px solid #2a3a55;border-radius:8px;padding:10px;text-align:center;}
.bag-icon{font-size:26px;margin-bottom:4px;}
.bag-name{font-size:9px;color:#ccddff;margin-bottom:2px;}
.bag-desc{font-size:8px;color:#7799aa;line-height:1.5;margin-bottom:5px;}
.bag-cnt{font-size:10px;color:#ffcc44;margin-bottom:5px;}
.evo-card{background:#1a2a3a;border:2px solid #2a3a55;border-radius:6px;padding:9px;text-align:center;cursor:pointer;transition:all 0.2s;}
.evo-card:hover,.evo-card:active{border-color:#88ccff;background:#1e2e44;}
.evo-card.selected{border-color:#44aaff;background:#102030;}
.evo-card .evo-name{font-size:9px;color:#88ccff;margin-top:5px;}
.evo-card .evo-req{font-size:8px;color:#7799aa;margin-top:2px;}
.enemy-btn{font-family:'Press Start 2P',monospace;font-size:10px;background:#1a2a3a;color:#eef4ff;border:2px solid #2a3a55;border-radius:7px;padding:10px;cursor:pointer;text-align:left;width:100%;box-shadow:0 3px 0 #0a1020;transition:all 0.12s;-webkit-tap-highlight-color:transparent;}
.enemy-btn:hover,.enemy-btn:active{background:#1e2e44;border-color:#6688cc;}
.save-indicator{font-size:8px;color:#66aa66;text-align:right;}
#battle-screen{background:#1a2535;border-radius:10px;padding:12px;}
.battle-arena{border:3px solid #2a3a55;border-radius:10px;position:relative;height:205px;overflow:hidden;}
.arena-bg{position:absolute;inset:0;z-index:0;}
.fw{position:absolute;bottom:26px;display:flex;flex-direction:column;align-items:center;gap:3px;z-index:2;}
#fw-my{left:8px;}#fw-en{right:8px;}
.fsv{width:74px;height:74px;display:block;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.7));}
#fw-en .fsv{transform:scaleX(-1);}
.flabel{font-size:8px;color:#fff;text-shadow:1px 1px 3px #000;white-space:nowrap;}
.hps{width:74px;height:7px;background:#0a1a0a;border:1px solid #4a7a4a;border-radius:4px;overflow:hidden;margin-bottom:1px;}
.sps{width:74px;height:4px;background:#1a0a2a;border:1px solid #6622aa;border-radius:3px;overflow:hidden;}
.hpi{height:100%;border-radius:4px;transition:width 0.4s;}
.myhp{background:#44ff88;}.enhp{background:#ff5544;}
.spi{height:100%;border-radius:3px;background:#cc44ff;transition:width 0.4s;}
.efx{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:46px;opacity:0;z-index:3;}
@keyframes sa{0%{opacity:1;transform:scale(0.5) rotate(-20deg)}50%{opacity:1;transform:scale(1.4)}100%{opacity:0;transform:scale(2)}}
@keyframes ba{0%{opacity:1;transform:scale(0.3)}40%{opacity:1;transform:scale(1.6)}100%{opacity:0;transform:scale(2.4)}}
@keyframes spa{0%{opacity:1;transform:scale(0.2) rotate(0)}50%{opacity:1;transform:scale(1.4) rotate(180deg)}100%{opacity:0;transform:scale(2.2) rotate(360deg)}}
@keyframes ha{0%{opacity:1;transform:translateX(0)}50%{opacity:1;transform:translateX(18px) scale(1.3)}100%{opacity:0;transform:translateX(36px)}}
@keyframes mya{0%,100%{transform:translateX(0)}50%{transform:translateX(24px)}}
@keyframes ena{0%,100%{transform:translateX(0)}50%{transform:translateX(-24px)}}
@keyframes hf{0%,100%{opacity:1}30%,70%{opacity:0.1}}
.blog{background:#0d1520;border:2px solid #2a3a50;border-radius:6px;padding:6px 9px;font-size:9px;color:#aabbcc;max-height:78px;overflow-y:auto;line-height:2;white-space:pre-wrap;}
#result-screen{background:#1a2535;border-radius:10px;padding:18px;text-align:center;gap:12px;}
.rtitle{font-size:15px;letter-spacing:2px;}
.rwin{color:#88ffaa;}.rlose{color:#ff8888;}
.rsprite{width:100px;height:100px;margin:0 auto;animation:idle 1.2s ease-in-out infinite;}
.rstats{background:#111e2d;border:2px solid #2a3a55;border-radius:8px;padding:11px;font-size:9px;color:#aabbcc;line-height:2.2;text-align:left;}
.title-screen{text-align:center;gap:16px;}
.gtitle{font-size:14px;color:#88ccff;letter-spacing:2px;line-height:2;}
.blink{animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div id="game">

<!-- 標題畫面 -->
<div id="title-screen" class="screen active title-screen">
  <div class="gtitle">數碼<br>對戰</div>
  <svg width="88" height="88" viewBox="0 0 100 100" style="margin:0 auto;animation:idle 1.2s ease-in-out infinite;">
    <circle cx="50" cy="50" r="28" fill="#111"/>
    <circle cx="44" cy="46" r="6" fill="#fff"/><circle cx="44" cy="46" r="3.5" fill="#cc0000"/>
    <circle cx="58" cy="44" r="5" fill="#fff"/><circle cx="58" cy="44" r="3" fill="#cc0000"/>
    <path d="M38 58 Q50 68 62 58" stroke="#cc0000" stroke-width="2.5" fill="none"/>
    <rect x="43" y="58" width="4" height="6" rx="1" fill="#fff"/>
    <rect x="50" y="59" width="4" height="7" rx="1" fill="#fff"/>
    <line x1="22" y1="50" x2="10" y2="46" stroke="#111" stroke-width="5" stroke-linecap="round"/>
    <line x1="78" y1="50" x2="90" y2="46" stroke="#111" stroke-width="5" stroke-linecap="round"/>
  </svg>
  <div style="font-size:9px;color:#7799bb;">v0.8 養成版</div>
  <div class="save-indicator" id="save-status"></div>
  <button class="success" onclick="startGame()" style="font-size:13px;padding:13px;">▶ 開始遊戲</button>
  <button onclick="newGame()" style="font-size:10px;padding:8px;color:#ffee44;">↺ 重新開始</button>
  <div style="font-size:9px;color:#5577aa;" class="blink">按下開始</div>
</div>

<!-- 主畫面 -->
<div id="main-screen" class="screen">
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="showTab('status')">狀態</div>
    <div class="nav-tab" onclick="showTab('bag')">背包</div>
    <div class="nav-tab" onclick="showTab('battle')">對戰</div>
    <div class="nav-tab" onclick="showTab('evolve')">進化</div>
  </div>
  <div class="save-indicator" id="save-status2">✓ 自動存檔</div>

  <!-- 狀態 -->
  <div id="tab-status" style="display:flex;flex-direction:column;gap:9px;">
    <div id="warn-hunger" class="warn-bar warn-hunger" style="display:none;">⚠ 肚子餓了！快去背包餵食！</div>
    <div id="warn-mood" class="warn-bar warn-mood" style="display:none;">⚠ 心情很差！去背包餵糖果或玩耍！</div>
    <div class="lcd">
      <svg class="lcd-bg" viewBox="0 0 300 160" preserveAspectRatio="xMidYMid slice" id="lcd-bg-svg"></svg>
      <div class="lcd-content">
        <div class="stage-tag" id="stage-label">幼年期I</div>
        <svg id="my-sprite" class="mon-display" viewBox="0 0 100 100"></svg>
        <div class="name-tag" id="my-name">巴達獸</div>
      </div>
    </div>
    <div>
      <div class="stat-row"><span class="stat-row-label">生命值</span><div class="bar-wrap"><div class="bar-fill hp-c" id="hp-bar" style="width:100%"></div></div><span class="stat-row-val" id="hp-text" style="color:#88ffaa;font-size:8px;"></span></div>
      <div class="stat-row"><span class="stat-row-label">飽食度</span><div class="bar-wrap"><div class="bar-fill hunger-c" id="hunger-bar" style="width:80%"></div></div><span class="stat-row-val" id="hunger-text" style="color:#ffaa22;font-size:8px;"></span></div>
      <div class="stat-row"><span class="stat-row-label">心情值</span><div class="bar-wrap"><div class="bar-fill mood-c" id="mood-bar" style="width:80%"></div></div><span class="stat-row-val" id="mood-text" style="color:#ff88cc;font-size:8px;"></span></div>
      <div class="stat-row"><span class="stat-row-label">經驗值</span><div class="bar-wrap"><div class="bar-fill xp-c" id="xp-bar" style="width:0%"></div></div><span class="stat-row-val"></span></div>
      <div class="stat-row"><span class="stat-row-label">必殺能量</span><div class="bar-wrap" style="background:#1a0a2a;border-color:#6622aa;"><div class="bar-fill sp-c" id="sp-bar" style="width:0%"></div></div><span class="stat-row-val" id="sp-text" style="color:#cc88ff;font-size:8px;"></span></div>
    </div>
    <div class="stats-grid">
      <div class="stat-box"><div class="lbl">等級</div><div class="val" id="stat-lv">1</div></div>
      <div class="stat-box"><div class="lbl">攻擊</div><div class="val" id="stat-atk">8</div></div>
      <div class="stat-box"><div class="lbl">勝場</div><div class="val" id="stat-win">0</div></div>
      <div class="stat-box"><div class="lbl">步數</div><div class="val" id="stat-steps">0</div></div>
    </div>
    <div class="msg-box" id="status-msg">你的數碼獸正在等待冒險...</div>
    <div class="btn-row">
      <button class="action-btn" onclick="doTrain()">⚔ 訓練</button>
      <button class="action-btn" onclick="doPlay()">♪ 玩耍</button>
    </div>
    <div class="btn-row single">
      <button onclick="doStepCheck()" style="color:#88ffaa;">👟 更新步數</button>
    </div>
  </div>

  <!-- 背包 -->
  <div id="tab-bag" style="display:none;flex-direction:column;gap:10px;">
    <div class="section-title">背包道具</div>
    <div class="bag-grid" id="bag-grid"></div>
    <div class="msg-box" id="bag-msg">選擇道具使用！</div>
  </div>

  <!-- 對戰 -->
  <div id="tab-battle" style="display:none;flex-direction:column;gap:8px;">
    <div class="section-title">選擇對手</div>
    <div id="enemy-list" style="display:flex;flex-direction:column;gap:7px;"></div>
    <div class="msg-box" id="battle-msg">選擇對手開始！</div>
  </div>

  <!-- 進化 -->
  <div id="tab-evolve" style="display:none;flex-direction:column;gap:8px;">
    <div class="section-title">進化路線</div>
    <div id="evo-list" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
    <div class="msg-box" id="evo-msg">達成條件即可進化！</div>
    <div class="btn-row single" style="margin-top:4px;">
      <button class="success" onclick="doEvolve()" id="evo-btn" disabled style="font-size:12px;padding:13px;color:#ccffdd;">★ 進化！</button>
    </div>
  </div>
</div>

<!-- 戰鬥畫面 -->
<div id="battle-screen" class="screen">
  <div class="battle-arena">
    <svg class="arena-bg" id="arena-bg-svg" viewBox="0 0 320 205" preserveAspectRatio="xMidYMid slice"></svg>
    <div class="fw" id="fw-my">
      <div class="hps"><div class="hpi myhp" id="my-hp-inner" style="width:100%"></div></div>
      <div class="sps"><div class="spi" id="my-sp-inner" style="width:0%"></div></div>
      <svg id="my-fighter-svg" class="fsv" viewBox="0 0 100 100"></svg>
      <div class="flabel" id="my-fighter-label">我方</div>
    </div>
    <div class="fw" id="fw-en">
      <div class="hps"><div class="hpi enhp" id="en-hp-inner" style="width:100%"></div></div>
      <div class="sps" style="opacity:0.4;"><div class="spi" id="en-sp-inner" style="width:0%"></div></div>
      <svg id="en-fighter-svg" class="fsv" viewBox="0 0 100 100"></svg>
      <div class="flabel" id="en-fighter-label">敵方</div>
    </div>
    <div class="efx" id="effect-layer"></div>
  </div>
  <div class="blog" id="battle-log"></div>
  <div class="btn-row" id="battle-btns">
    <button onclick="battleAction('attack')" id="btn-attack" style="font-size:12px;padding:11px 6px;">⚔ 攻擊</button>
    <button class="sp-btn" onclick="battleAction('special')" id="btn-special" style="font-size:11px;padding:11px 6px;">★ 必殺<br><span id="sp-charge-text" style="font-size:7px;color:#aa66cc;">0/5</span></button>
  </div>
  <div class="btn-row single" id="flee-btn-wrap">
    <button class="danger" onclick="fleeBattle()" style="font-size:11px;">↩ 逃跑</button>
  </div>
</div>

<!-- 結果畫面 -->
<div id="result-screen" class="screen">
  <div class="rtitle" id="result-title">勝利！</div>
  <svg id="result-sprite" class="rsprite" viewBox="0 0 100 100"></svg>
  <div class="rstats" id="result-stats"></div>
  <div class="btn-row single">
    <button class="success" onclick="backToMain()" style="font-size:12px;padding:13px;color:#ccffdd;">▶ 繼續冒險</button>
  </div>
</div>

</div>
<script>
const BG={
grassland:`<rect width="320" height="205" fill="#4a8a3a"/><rect y="132" width="320" height="73" fill="#3a6a2a"/><rect y="124" width="320" height="11" fill="#5aaa4a"/><ellipse cx="60" cy="74" rx="36" ry="26" fill="#fff" opacity="0.7"/><ellipse cx="218" cy="56" rx="30" ry="20" fill="#fff" opacity="0.6"/><circle cx="98" cy="27" r="12" fill="#ffee44" opacity="0.9"/>`,
city:`<rect width="320" height="205" fill="#1a2030"/><rect x="0" y="74" width="42" height="131" fill="#252535"/><rect x="48" y="46" width="50" height="159" fill="#1e2840"/><rect x="153" y="37" width="56" height="168" fill="#1a2235"/><rect x="218" y="60" width="42" height="145" fill="#222840"/><rect x="52" y="50" width="7" height="6" fill="#ffee88" opacity="0.9"/><rect x="158" y="43" width="8" height="7" fill="#ffee88" opacity="0.9"/><rect y="132" width="320" height="73" fill="#111820"/>`,
sewer:`<rect width="320" height="205" fill="#1a1a10"/><rect y="140" width="320" height="65" fill="#0f1408"/><rect y="134" width="320" height="10" fill="#2a2a18"/><rect x="0" y="17" width="18" height="188" fill="#222218"/><rect x="302" y="17" width="18" height="188" fill="#222218"/><rect x="27" y="17" width="13" height="122" fill="#1e1e14"/><rect x="146" y="17" width="13" height="112" fill="#1e1e14"/><circle cx="48" cy="56" r="3" fill="#88ff44" opacity="0.4"/>`,
volcano:`<rect width="320" height="205" fill="#1a0800"/><polygon points="98,0 154,130 42,130" fill="#2a1008"/><polygon points="215,17 262,130 168,130" fill="#251008"/><ellipse cx="154" cy="7" rx="22" ry="12" fill="#ff4400" opacity="0.8"/><ellipse cx="154" cy="2" rx="8" ry="5" fill="#ffcc00" opacity="0.95"/><rect y="130" width="320" height="75" fill="#1a0500"/>`,
};
const LCDBG={
grassland:`<rect width="300" height="160" fill="#4a8a3a"/><rect y="100" width="300" height="60" fill="#3a6a2a"/><ellipse cx="48" cy="46" rx="32" ry="22" fill="#fff" opacity="0.6"/><circle cx="255" cy="19" r="12" fill="#ffee44" opacity="0.8"/>`,
city:`<rect width="300" height="160" fill="#1a2030"/><rect x="52" y="23" width="46" height="137" fill="#1e2840"/><rect x="152" y="17" width="50" height="143" fill="#1a2235"/><rect y="100" width="300" height="60" fill="#111820"/><rect x="56" y="27" width="6" height="5" fill="#ffee88" opacity="0.9"/>`,
sewer:`<rect width="300" height="160" fill="#1a1a10"/><rect y="106" width="300" height="54" fill="#0f1408"/><rect x="0" y="13" width="15" height="147" fill="#222218"/><rect x="27" y="13" width="11" height="94" fill="#1e1e14"/><circle cx="46" cy="46" r="3" fill="#88ff44" opacity="0.4"/>`,

const HUNGER_PH=12,MOOD_PH=8,HP_HUNGRY_PH=5,SP_MAX=5,KEY="digibattle_v8";
function defG(){return{monId:"botamon",hp:40,maxHp:40,xp:0,wins:0,steps:0,sp:0,hunger:80,mood:80,lastSeen:Date.now(),bag:{meat:3,snack:3,potion:2,vitamin:1}};}

function load(){try{const d=localStorage.getItem(KEY);if(d){const p=JSON.parse(d);if(p&&p.monId&&MONS[p.monId]){G=p;['sp','hunger','mood'].forEach(k=>{if(G[k]==null)G[k]=k==='sp'?0:80;});if(!G.bag)G.bag={meat:3,snack:3,potion:2,vitamin:1};if(!G.lastSeen)G.lastSeen=Date.now();document.getElementById("save-status").textContent="✓ 找到存檔！";return true;}}}catch(e){}return false;}
function newGame(){try{localStorage.removeItem(KEY);}catch(e){}G=defG();document.getElementById("save-status").textContent="已重置";}
function mon(){return MONS[G.monId];}
function ss(id,h){const e=document.getElementById(id);if(e)e.innerHTML=h;}
function m(id,t){document.getElementById(id).textContent=t;}
function an(cls){const s=document.getElementById("my-sprite");if(!s)return;s.classList.remove("shake","happy");void s.offsetWidth;s.classList.add(cls);}
function updateLcd(){const e=document.getElementById("lcd-bg-svg");if(e)e.innerHTML=LCDBG[MSCENE[G.monId]||"grassland"];}
function applyDecay(){
  const now=Date.now(),hrs=Math.min((now-G.lastSeen)/3600000,24);
  if(hrs<0.05)return null;
  const hl=Math.round(hrs*HUNGER_PH),ml=Math.round(hrs*MOOD_PH);
  G.hunger=Math.max(0,G.hunger-hl);G.mood=Math.max(0,G.mood-ml);
  if(G.hunger===0)G.hp=Math.max(1,G.hp-Math.round(hrs*HP_HUNGRY_PH));
  G.lastSeen=now;
  return{mins:Math.round(hrs*60),hl,ml};
}
function startGame(){
  const d=applyDecay();
  document.getElementById("title-screen").classList.remove("active");
  document.getElementById("main-screen").classList.add("active");
  refresh();buildEnemies();buildEvoList();buildBag();
  if(d&&d.mins>2){
    let t="離開了 "+d.mins+" 分鐘";
    if(d.hl>0)t+="，飽食 -"+d.hl;if(d.ml>0)t+="，心情 -"+d.ml;
    if(G.hunger===0)t+="，餓太久 HP 下降！";
    m("status-msg",t);save();
  }
}

  ["battle-screen","result-screen"].forEach(id=>document.getElementById(id).classList.remove("active"));

}

function showTab(tab){
  const ts=["status","bag","battle","evolve"];
  ts.forEach((t,i)=>{
    document.querySelectorAll(".nav-tab")[i].classList.toggle("active",t===tab);
    const el=document.getElementById("tab-"+t);
    if(el){el.style.display=t===tab?"flex":"none";if(t===tab)el.style.flexDirection="column";}
  });
  if(tab==="evolve")buildEvoList();if(tab==="bag")buildBag();
}
function refresh(){
  const mo=mon();
  ss("my-sprite",mo.svg);document.getElementById("my-sprite").className="mon-display";
  document.getElementById("my-name").textContent=mo.name;
  document.getElementById("stage-label").textContent=mo.stage;
  document.getElementById("stat-lv").textContent=mo.lv+Math.floor(G.xp/30);
  document.getElementById("stat-atk").textContent=mo.atk+G.wins*2;
  document.getElementById("stat-win").textContent=G.wins;
  document.getElementById("stat-steps").textContent=G.steps;
  const hP=Math.round(G.hp/G.maxHp*100);
  const hB=document.getElementById("hp-bar");
  hB.style.width=hP+"%";hB.style.background=hP<=25?"#ff4444":hP<=50?"#ffaa22":"#44ff88";
  document.getElementById("hp-text").textContent=G.hp+"/"+G.maxHp;
  document.getElementById("hunger-bar").style.width=G.hunger+"%";document.getElementById("hunger-text").textContent=G.hunger+"/100";
  document.getElementById("mood-bar").style.width=G.mood+"%";document.getElementById("mood-text").textContent=G.mood+"/100";
  document.getElementById("xp-bar").style.width=Math.min(100,Math.round(G.xp/mo.xpNeeded*100))+"%";
  document.getElementById("sp-bar").style.width=Math.round(G.sp/SP_MAX*100)+"%";
  document.getElementById("sp-text").textContent=G.sp+"/"+SP_MAX+(G.sp>=SP_MAX?" ★":"");
  document.getElementById("warn-hunger").style.display=G.hunger<25?"block":"none";
  document.getElementById("warn-mood").style.display=G.mood<25?"block":"none";
  updateLcd();
}
function doTrain(){
  if(G.hp<G.maxHp*0.15){m("status-msg","HP太低！先用急救藥！");return;}
  if(G.hunger<15){m("status-msg","肚子太餓！先從背包餵食！");return;}
  const g=Math.floor(Math.random()*8+5);
  G.xp+=g;G.hp=Math.max(1,G.hp-Math.floor(G.maxHp*0.1));
  G.hunger=Math.max(0,G.hunger-10);G.mood=Math.min(100,G.mood+5);G.sp=Math.min(SP_MAX,G.sp+1);
  m("status-msg","訓練完成！+"+g+" EXP，能量 +1");an("shake");refresh();buildEvoList();save();
}
function doPlay(){
  G.mood=Math.min(100,G.mood+20);G.hunger=Math.max(0,G.hunger-5);G.sp=Math.min(SP_MAX,G.sp+1);
  m("status-msg","玩耍完！心情 +20，能量 +1");an("happy");refresh();save();
}
function doStepCheck(){
  if(typeof DeviceMotionEvent!=="undefined"&&DeviceMotionEvent.requestPermission){
    DeviceMotionEvent.requestPermission().then(s=>{fakeSteps();}).catch(()=>fakeSteps());
  }else fakeSteps();
}
function fakeSteps(){
  const s=Math.floor(Math.random()*300+100);G.steps+=s;
  const xp=Math.floor(s/50);G.xp+=xp;G.mood=Math.min(100,G.mood+Math.floor(s/100));G.sp=Math.min(SP_MAX,G.sp+1);
  m("status-msg","走了 "+s+" 步！+"+xp+" EXP，心情 +"+Math.floor(s/100));
  refresh();buildEvoList();save();
}
function buildBag(){
  const el=document.getElementById("bag-grid");if(!el)return;el.innerHTML="";
  Object.entries(ITEMS).forEach(([k,it])=>{
    const cnt=G.bag[k]||0,d=document.createElement("div");d.className="bag-card";
    d.innerHTML=`<div class="bag-icon">${it.icon}</div><div class="bag-name">${it.name}</div><div class="bag-desc">${it.desc}</div><div class="bag-cnt">持有：${cnt} 個</div><button class="item-btn" style="width:100%;" ${cnt<=0?"disabled":""} onclick="useItem('${k}')">使用</button>`;
    el.appendChild(d);
  });
}
function useItem(k){
  if(!G.bag[k]||G.bag[k]<=0){m("bag-msg","道具不夠了！");return;}
  G.bag[k]--;ITEMS[k].effect();refresh();buildBag();save();
}
function buildEnemies(){
  const el=document.getElementById("enemy-list");el.innerHTML="";
  ENEMIES.forEach((e,i)=>{
    const b=document.createElement("button");b.className="enemy-btn";
    b.innerHTML=(e.lv<=mon().lv+3?"⚔":"☠")+" <b>"+e.name+"</b>　等級:"+e.lv+"　攻擊:"+e.atk+"　HP:"+e.hp;
    b.onclick=()=>startBattle(i);el.appendChild(b);
  });
}
function buildEvoList(){
  const el=document.getElementById("evo-list");el.innerHTML="";
  const ps=EPATH[G.monId]||[];const mo=mon();const ok=G.xp>=mo.xpNeeded;
  if(!ps.length){el.innerHTML='<div style="font-size:9px;color:#5577aa;grid-column:1/-1;text-align:center;padding:14px;">已達最終形態</div>';document.getElementById("evo-btn").disabled=true;m("evo-msg","已是最強形態！");return;}
  ps.forEach(pid=>{
    const pm=MONS[pid],c=document.createElement("div");c.className="evo-card";
    c.innerHTML='<div style="display:flex;justify-content:center;"><svg viewBox="0 0 100 100" width="54" height="54">'+pm.svg+'</svg></div><div class="evo-name">'+pm.name+'</div><div class="evo-req">需 '+mo.xpNeeded+' EXP</div>';
    c.onclick=()=>{document.querySelectorAll(".evo-card").forEach(x=>x.classList.remove("selected"));c.classList.add("selected");document.getElementById("evo-btn").disabled=!ok;};
    el.appendChild(c);
  });
  m("evo-msg",ok?"條件達成！選擇目標！":"需 "+mo.xpNeeded+" EXP，目前 "+Math.floor(G.xp));
  document.getElementById("evo-btn").disabled=true;
}
function doEvolve(){
  const sel=document.querySelector(".evo-card.selected");if(!sel){m("evo-msg","請先選擇目標！");return;}
  const ps=EPATH[G.monId];const tid=ps[Array.from(document.querySelectorAll(".evo-card")).indexOf(sel)];
  const tm=MONS[tid];G.monId=tid;G.hp=tm.hp;G.maxHp=tm.hp;G.xp=0;G.hunger=80;G.mood=90;
  showTab("status");m("status-msg","恭喜！進化為「"+tm.name+"」！");
  refresh();buildEnemies();buildEvoList();save();
}
let B={};const SPB=5;
function efx(type,side){
  const el=document.getElementById("effect-layer");
  const map={slash:{e:"⚡",a:"sa 0.5s ease-out forwards"},boom:{e:"💥",a:"ba 0.6s ease-out forwards"},special:{e:"🌟",a:"spa 0.8s ease-out forwards"},hit:{e:"✨",a:"ha 0.4s ease-out forwards"}};
  const ef=map[type];if(!ef)return;
  el.textContent=ef.e;el.style.opacity="0";el.style.animation="none";void el.offsetWidth;
  el.style.justifyContent=side==="right"?"flex-end":"flex-start";
  el.style.paddingLeft=side==="left"?"28px":"0";el.style.paddingRight=side==="right"?"28px":"0";
  el.style.animation=ef.a;
}
function af(id,an2,dur){const el=document.getElementById(id);if(!el)return;el.style.animation=an2+" "+dur+"s ease-in-out";setTimeout(()=>{el.style.animation="";},dur*1000);}
function hf(id){const el=document.getElementById(id);if(!el)return;el.style.animation="hf 0.5s ease-in-out";setTimeout(()=>{el.style.animation="";},500);}
function setBtns(en){document.getElementById("btn-attack").disabled=!en;updSP();}
function updSP(){
  const btn=document.getElementById("btn-special");
  btn.disabled=(B.over||B.busy||B.sp<SPB);
  document.getElementById("sp-charge-text").textContent=(B.sp||0)+"/"+SPB;
  document.getElementById("my-sp-inner").style.width=Math.min(100,Math.round((B.sp||0)/SPB*100))+"%";
}
function updBars(){
  document.getElementById("my-hp-inner").style.width=Math.max(0,Math.round(B.mHp/B.mMaxHp*100))+"%";
  document.getElementById("en-hp-inner").style.width=Math.max(0,Math.round(B.eHp/B.eMaxHp*100))+"%";
  document.getElementById("en-sp-inner").style.width=Math.min(100,Math.round((B.eSp||0)/SPB*100))+"%";
  updSP();
}
function blog(t){const el=document.getElementById("battle-log");el.textContent+=t+"\n";el.scrollTop=el.scrollHeight;}
function startBattle(idx){
  if(G.hunger<10){m("battle-msg","太餓了！先去背包餵食！");return;}
  const en=ENEMIES[idx];
  B={idx,eHp:en.hp,eMaxHp:en.hp,mHp:G.hp,mMaxHp:G.maxHp,sp:G.sp,eSp:0,over:false,busy:false};
  document.getElementById("main-screen").classList.remove("active");
  document.getElementById("battle-screen").classList.add("active");
  ss("my-fighter-svg",mon().svg);ss("en-fighter-svg",en.svg);
  document.getElementById("my-fighter-label").textContent=mon().name;
  document.getElementById("en-fighter-label").textContent=en.name;
  document.getElementById("my-hp-inner").style.width=Math.round(G.hp/G.maxHp*100)+"%";
  document.getElementById("en-hp-inner").style.width="100%";
  document.getElementById("battle-log").textContent="";
  document.getElementById("battle-btns").style.display="grid";
  document.getElementById("flee-btn-wrap").style.display="block";
  setBtns(true);
  const bg=document.getElementById("arena-bg-svg");if(bg)bg.innerHTML=BG[ESCENE[idx]||"grassland"];
  blog("⚔ "+mon().name+" VS "+en.name);
  if(G.hp<G.maxHp)blog("我方HP："+G.hp+"/"+G.maxHp);
  updBars();
}
function showResult(win,en,xp){
  document.getElementById("battle-screen").classList.remove("active");
  document.getElementById("result-screen").classList.add("active");
  const t=document.getElementById("result-title");
  t.textContent=win?"✨ 勝利！":"💀 敗北...";t.className="rtitle "+(win?"rwin":"rlose");
  document.getElementById("result-sprite").innerHTML=mon().svg;
  document.getElementById("result-stats").innerHTML=win?
    "對手："+en.name+"\n獲得EXP：+"+xp+"\nHP："+G.hp+"/"+G.maxHp+"\n飽食："+G.hunger+"/100\n心情："+G.mood+"/100\n總勝場："+G.wins:
    "對手："+en.name+"\nHP剩："+G.hp+"/"+G.maxHp+"\n先去背包恢復再挑戰！";
}
function battleAction(type){
  if(B.over||B.busy)return;
  if(type==="special"&&B.sp<SPB){blog("必殺能量不足！");return;}
  B.busy=true;setBtns(false);
  const en=ENEMIES[B.idx],myAtk=mon().atk+G.wins*2;
  let dmg;
  if(type==="special"){dmg=Math.floor(myAtk*(2.2+Math.random()*0.6));B.sp=0;}
  else{dmg=Math.floor(myAtk*(0.7+Math.random()*0.6));B.sp=Math.min(SPB,B.sp+1);}
  af("fw-my","mya",0.35);
  setTimeout(()=>{
    efx(type==="special"?"special":"slash","right");
    hf("en-fighter-svg");B.eHp-=dmg;updBars();
    blog((type==="special"?"🌟 必殺！":"⚔ 攻擊")+"→ 敵方 -"+dmg+" HP");
    if(B.eHp<=0){
      B.over=true;G.wins++;const xp=Math.floor(en.lv*8+20);
      G.xp+=xp;G.hp=B.mHp;G.sp=B.sp;G.mood=Math.min(100,G.mood+15);G.hunger=Math.max(0,G.hunger-15);
      efx("boom","right");
      document.getElementById("battle-btns").style.display="none";
      document.getElementById("flee-btn-wrap").style.display="none";
      setTimeout(()=>{showResult(true,en,xp);buildEvoList();save();},1200);return;
    }
    setTimeout(()=>{
      af("fw-en","ena",0.35);
      setTimeout(()=>{
        B.eSp=Math.min(SPB,B.eSp+1);let ed;
        if(B.eSp>=SPB){ed=Math.floor(en.atk*(2.0+Math.random()*0.5));B.eSp=0;efx("special","left");blog("😈 敵方必殺！→ 我方 -"+ed+" HP");}
        else{ed=Math.floor(en.atk*(0.7+Math.random()*0.6));efx("hit","left");blog("💢 反擊！→ 我方 -"+ed+" HP");}
        hf("my-fighter-svg");B.mHp-=ed;updBars();
        if(B.mHp<=0){
          B.over=true;G.hp=Math.max(1,Math.floor(G.maxHp*0.1));G.sp=0;G.mood=Math.max(0,G.mood-20);
          document.getElementById("battle-btns").style.display="none";
          document.getElementById("flee-btn-wrap").style.display="none";
          setTimeout(()=>{showResult(false,en,0);save();},1200);return;
        }
        B.busy=false;setBtns(true);
      },250);
    },500);
  },300);
}
function fleeBattle(){G.hp=B.mHp;G.sp=B.sp;showMain();m("status-msg","逃跑成功！");save();}
load();
</script>
</body>
</html>
