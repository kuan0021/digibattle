<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a2230">
<title>數碼對戰</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#1a2230;overflow:hidden;}
#game{font-family:'Press Start 2P',monospace;background:#2e3a4a;color:#e8f0ff;width:100%;max-width:430px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;}
.screen{display:none;flex-direction:column;height:100%;}.screen.active{display:flex;}
.top-zone{flex-shrink:0;display:flex;flex-direction:column;gap:8px;padding:8px 10px 0;}
.zone-monster{height:170px;border:3px solid #4a7a4a;border-radius:10px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.zone-monster .lbg{position:absolute;inset:0;z-index:0;}
.mon-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.mon-svg{width:88px;height:88px;animation:idle 1.2s ease-in-out infinite;filter:drop-shadow(0 4px 10px rgba(0,0,0,0.7));}
@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.mon-svg.shake{animation:shake 0.4s ease-in-out;}
.mon-svg.happy{animation:happy 0.5s ease-in-out 3;}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
@keyframes happy{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.mon-name{font-size:11px;color:#88ffaa;}
.mon-stage{font-size:9px;color:#ffcc44;}
.warn-strip{position:absolute;bottom:5px;left:6px;right:6px;z-index:2;font-size:8px;text-align:center;padding:3px 5px;border-radius:4px;animation:bl2 1s step-end infinite;}
@keyframes bl2{0%,100%{opacity:1}50%{opacity:0.3}}
.wh{background:#2a1500;color:#ffaa44;border:1px solid #ff8822;}
.wm{background:#1a0a22;color:#ff88cc;border:1px solid #cc44aa;bottom:22px;}
.zone-stats{background:#162030;border:2px solid #2a3a50;border-radius:10px;padding:8px 12px;display:flex;flex-direction:column;gap:4px;}
.sr{display:flex;align-items:center;gap:6px;}
.sl{font-size:8px;color:#99bbff;width:58px;flex-shrink:0;}
.sv{font-size:8px;width:44px;flex-shrink:0;text-align:right;}
.bw{flex:1;height:9px;background:#0a1418;border:1px solid #2a4a3a;border-radius:5px;overflow:hidden;}
.bf{height:100%;border-radius:5px;transition:width 0.5s;}
.hc{background:#44ff88;}.nc{background:#ffaa22;}.mc{background:#ff88cc;}.xc{background:#4488ff;}.sc{background:#cc44ff;}
.sng{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:2px;}
.sb{background:#0e1c28;border:1px solid #2a3a55;border-radius:5px;padding:5px 2px;text-align:center;}
.sb .v{font-size:11px;color:#fff;margin-top:2px;}
.sb .l{color:#6688aa;font-size:7px;}
.content-zone{flex:1;overflow:hidden;padding:8px 10px 6px;position:relative;}
.tab-content{display:none;flex-direction:column;gap:7px;height:100%;overflow-y:auto;}
.tab-content.active{display:flex;}
.bot-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:7px 10px 12px;background:#1a2535;border-top:2px solid #2a3a50;flex-shrink:0;}
.nav-tab{font-family:'Press Start 2P',monospace;font-size:11px;background:#162030;color:#7799bb;border:2px solid #2a3a50;border-radius:8px;padding:12px 2px;cursor:pointer;text-align:center;transition:all 0.12s;-webkit-tap-highlight-color:transparent;line-height:1.5;}
.nav-tab.active{background:#1a3a5a;color:#fff;border-color:#4488cc;}
.nav-tab:active{transform:scale(0.96);}
.br{display:grid;grid-template-columns:1fr 1fr;gap:8px;}.br.s{grid-template-columns:1fr;}
button{font-family:'Press Start 2P',monospace;font-size:12px;padding:13px 8px;border-radius:8px;cursor:pointer;transition:transform 0.1s;border:none;background:#1e3a60;color:#fff;box-shadow:0 4px 0 #0a1a30,0 0 0 2px #3a6aaa;line-height:1.4;-webkit-tap-highlight-color:transparent;width:100%;}
button:active{transform:translateY(3px);box-shadow:0 1px 0 #0a1a30,0 0 0 2px #3a6aaa;}
button:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;background:#162030;color:#445566;}
button.g{background:#1a5530;color:#ccffdd;box-shadow:0 4px 0 #0a2215,0 0 0 2px #44aa66;}
button.g:active{box-shadow:0 1px 0 #0a2215,0 0 0 2px #44aa66;}
button.y{background:#1a3355;color:#ffee44;box-shadow:0 4px 0 #0a1a2a,0 0 0 2px #ffcc22;}
button.y:active{box-shadow:0 1px 0 #0a1a2a,0 0 0 2px #ffcc22;}
button.r{background:#551515;color:#ffdddd;box-shadow:0 4px 0 #220000,0 0 0 2px #cc3333;}
button.r:active{box-shadow:0 1px 0 #220000,0 0 0 2px #cc3333;}
button.p{background:#3a1060;color:#ee99ff;box-shadow:0 4px 0 #160030,0 0 0 2px #9933ff;}
button.p:active{box-shadow:0 1px 0 #160030,0 0 0 2px #9933ff;}
button.gps-on{background:#0a3322;color:#44ffaa;box-shadow:0 4px 0 #041810,0 0 0 2px #22cc77;font-size:11px;}
button.gps-on:active{box-shadow:0 1px 0 #041810,0 0 0 2px #22cc77;}
button.ib{background:#1e1030;color:#ffccff;box-shadow:0 4px 0 #0a0618,0 0 0 2px #8833cc;font-size:11px;padding:10px 6px;}
.mb{background:#0e1c28;border:2px solid #2a4060;border-radius:7px;padding:8px 11px;font-size:10px;color:#cce0ff;line-height:1.9;flex-shrink:0;}
.st{font-size:9px;color:#6688aa;border-bottom:1px solid #2a3a50;padding-bottom:5px;flex-shrink:0;}
.si{font-size:8px;color:#447744;text-align:right;padding:4px 10px 0;flex-shrink:0;}

/* GPS 狀態列 */
.gps-bar{
  display:flex;align-items:center;gap:8px;
  background:#0a1c18;border:2px solid #1a3a2a;border-radius:8px;
  padding:8px 12px;flex-shrink:0;
}
.gps-dot{width:10px;height:10px;border-radius:50%;background:#334;flex-shrink:0;transition:background 0.3s;}
.gps-dot.searching{background:#ffaa22;animation:pulse 1s ease-in-out infinite;}
.gps-dot.active{background:#44ff88;}
.gps-dot.error{background:#ff4444;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.gps-info{flex:1;display:flex;flex-direction:column;gap:2px;}
.gps-status{font-size:9px;color:#88aacc;}
.gps-meter{font-size:10px;color:#44ffaa;}
.gps-toggle-btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:7px 10px;border-radius:6px;cursor:pointer;border:none;background:#1a3322;color:#66ddaa;box-shadow:0 3px 0 #081510,0 0 0 1px #336644;-webkit-tap-highlight-color:transparent;flex-shrink:0;transition:all 0.1s;width:auto;}
.gps-toggle-btn:active{transform:translateY(2px);}
.gps-toggle-btn.on{background:#0d2e1e;color:#44ffaa;box-shadow:0 3px 0 #041208,0 0 0 1px #22aa55;}

.bg-g{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bc{background:#162030;border:2px solid #2a3a55;border-radius:8px;padding:10px;text-align:center;}
.bi{font-size:24px;margin-bottom:3px;}
.bn{font-size:9px;color:#ccddff;margin-bottom:2px;}
.bd{font-size:8px;color:#6688aa;line-height:1.5;margin-bottom:4px;}
.bct{font-size:10px;color:#ffcc44;margin-bottom:5px;}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ec{background:#162030;border:2px solid #2a3a55;border-radius:7px;padding:9px;text-align:center;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.ec:active,.ec.sel{border-color:#44aaff;background:#0e2040;}
.ec .en{font-size:9px;color:#88ccff;margin-top:4px;}
.ec .er{font-size:8px;color:#6688aa;margin-top:2px;}
.eb{font-family:'Press Start 2P',monospace;font-size:10px;background:#162030;color:#ddeeff;border:2px solid #2a3a55;border-radius:7px;padding:11px 10px;cursor:pointer;text-align:left;width:100%;box-shadow:0 3px 0 #08101a;-webkit-tap-highlight-color:transparent;}
.eb:active{background:#1e2e44;transform:translateY(2px);}
#title-screen{background:#1a2535;align-items:center;justify-content:center;gap:18px;padding:30px 20px;}
.gt{font-size:22px;color:#88ccff;letter-spacing:3px;line-height:1.8;text-align:center;}
.blink{animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#battle-screen{background:#1a2535;padding:10px;gap:8px;}
.ba{flex:0 0 195px;border:3px solid #2a3a55;border-radius:10px;position:relative;overflow:hidden;}
.abg{position:absolute;inset:0;z-index:0;}
.fw{position:absolute;bottom:22px;display:flex;flex-direction:column;align-items:center;gap:3px;z-index:2;}
#fw-my{left:8px;}#fw-en{right:8px;}
.fsv{width:74px;height:74px;display:block;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.7));}
#fw-en .fsv{transform:scaleX(-1);}
.fl{font-size:8px;color:#fff;text-shadow:1px 1px 3px #000;white-space:nowrap;}
.hs{width:74px;height:7px;background:#0a1a0a;border:1px solid #4a7a4a;border-radius:4px;overflow:hidden;margin-bottom:1px;}
.ss2{width:74px;height:4px;background:#1a0a2a;border:1px solid #6622aa;border-radius:3px;overflow:hidden;}
.hi{height:100%;border-radius:4px;transition:width 0.4s;}
.mh{background:#44ff88;}.eh{background:#ff5544;}
.si2{height:100%;border-radius:3px;background:#cc44ff;transition:width 0.4s;}
.efx{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:46px;opacity:0;z-index:3;}
@keyframes sa{0%{opacity:1;transform:scale(0.5) rotate(-20deg)}50%{opacity:1;transform:scale(1.4)}100%{opacity:0;transform:scale(2)}}
@keyframes ba2{0%{opacity:1;transform:scale(0.3)}40%{opacity:1;transform:scale(1.6)}100%{opacity:0;transform:scale(2.4)}}
@keyframes spa{0%{opacity:1;transform:scale(0.2) rotate(0)}50%{opacity:1;transform:scale(1.4) rotate(180deg)}100%{opacity:0;transform:scale(2.2) rotate(360deg)}}
@keyframes ha{0%{opacity:1;transform:translateX(0)}50%{opacity:1;transform:translateX(18px) scale(1.3)}100%{opacity:0;transform:translateX(36px)}}
@keyframes mya{0%,100%{transform:translateX(0)}50%{transform:translateX(24px)}}
@keyframes ena{0%,100%{transform:translateX(0)}50%{transform:translateX(-24px)}}
@keyframes hf{0%,100%{opacity:1}30%,70%{opacity:0.1}}
.bl{background:#0d1520;border:2px solid #2a3a50;border-radius:6px;padding:6px 9px;font-size:9px;color:#aabbcc;height:70px;overflow-y:auto;line-height:2;white-space:pre-wrap;flex-shrink:0;}
.bbt{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0;}
.bbt button{font-size:12px;padding:13px 6px;}
#result-screen{background:#1a2535;align-items:center;justify-content:center;padding:24px 16px;gap:14px;}
.rt{font-size:16px;letter-spacing:2px;}.rw{color:#88ffaa;}.rl{color:#ff8888;}
.rs2{width:110px;height:110px;animation:idle 1.2s ease-in-out infinite;}
.rst{background:#111e2d;border:2px solid #2a3a55;border-radius:8px;padding:12px;font-size:9px;color:#aabbcc;line-height:2.4;width:100%;}
</style>
</head>
<body>
<div id="game">

<div id="title-screen" class="screen active">
  <div class="gt">數碼<br>對戰</div>
  <svg width="96" height="96" viewBox="0 0 100 100" style="animation:idle 1.2s ease-in-out infinite;">
    <circle cx="50" cy="50" r="28" fill="#111"/>
    <circle cx="44" cy="46" r="6" fill="#fff"/><circle cx="44" cy="46" r="3.5" fill="#cc0000"/>
    <circle cx="58" cy="44" r="5" fill="#fff"/><circle cx="58" cy="44" r="3" fill="#cc0000"/>
    <path d="M38 58 Q50 68 62 58" stroke="#cc0000" stroke-width="2.5" fill="none"/>
    <rect x="43" y="58" width="4" height="6" rx="1" fill="#fff"/>
    <rect x="50" y="59" width="4" height="7" rx="1" fill="#fff"/>
    <line x1="22" y1="50" x2="10" y2="46" stroke="#111" stroke-width="5" stroke-linecap="round"/>
    <line x1="78" y1="50" x2="90" y2="46" stroke="#111" stroke-width="5" stroke-linecap="round"/>
  </svg>
  <div id="save-status" style="font-size:9px;color:#44aa44;"></div>
  <button class="g" onclick="startGame()" style="font-size:14px;padding:16px;max-width:240px;">▶ 開始遊戲</button>
  <button onclick="newGame()" style="font-size:10px;padding:10px;color:#ffee44;max-width:240px;">↺ 重新開始</button>
  <div style="font-size:9px;color:#445566;" class="blink">v0.10</div>
</div>

<div id="main-screen" class="screen">
  <div class="top-zone">
    <div class="si" id="save-status2">✓ 自動存檔</div>
    <div class="zone-monster">
      <svg class="lbg" viewBox="0 0 300 170" preserveAspectRatio="xMidYMid slice" id="lcd-bg-svg"></svg>
      <div class="mon-inner">
        <div class="mon-stage" id="stage-label">幼年期I</div>
        <svg id="my-sprite" class="mon-svg" viewBox="0 0 100 100"></svg>
        <div class="mon-name" id="my-name">巴達獸</div>
      </div>
      <div id="warn-hunger" class="warn-strip wh" style="display:none;">⚠ 肚子餓了！快去背包餵食！</div>
      <div id="warn-mood" class="warn-strip wm" style="display:none;">⚠ 心情很差！玩耍或餵糖果！</div>
    </div>
    <div class="zone-stats">
      <div class="sr"><span class="sl">生命值</span><div class="bw"><div class="bf hc" id="hp-bar" style="width:100%"></div></div><span class="sv" id="hp-text" style="color:#88ffaa;font-size:8px;"></span></div>
      <div class="sr"><span class="sl">飽食度</span><div class="bw"><div class="bf nc" id="hunger-bar" style="width:80%"></div></div><span class="sv" id="hunger-text" style="color:#ffaa22;font-size:8px;"></span></div>
      <div class="sr"><span class="sl">心情值</span><div class="bw"><div class="bf mc" id="mood-bar" style="width:80%"></div></div><span class="sv" id="mood-text" style="color:#ff88cc;font-size:8px;"></span></div>
      <div class="sr"><span class="sl">經驗值</span><div class="bw"><div class="bf xc" id="xp-bar" style="width:0%"></div></div><span class="sv"></span></div>
      <div class="sr"><span class="sl">必殺能量</span><div class="bw" style="background:#1a0a2a;border-color:#6622aa;"><div class="bf sc" id="sp-bar" style="width:0%"></div></div><span class="sv" id="sp-text" style="color:#cc88ff;font-size:8px;"></span></div>
      <div class="sng">
        <div class="sb"><div class="l">等級</div><div class="v" id="stat-lv">1</div></div>
        <div class="sb"><div class="l">攻擊</div><div class="v" id="stat-atk">8</div></div>
        <div class="sb"><div class="l">勝場</div><div class="v" id="stat-win">0</div></div>
        <div class="sb"><div class="l">公尺</div><div class="v" id="stat-steps">0</div></div>
      </div>
    </div>
  </div>

  <div class="content-zone">

    <!-- 狀態 tab -->
    <div id="tab-status" class="tab-content active">
      <!-- GPS 狀態列 -->
      <div class="gps-bar">
        <div class="gps-dot" id="gps-dot"></div>
        <div class="gps-info">
          <div class="gps-status" id="gps-status">GPS 未啟動</div>
          <div class="gps-meter" id="gps-meter">今日：0 公尺</div>
        </div>
        <button class="gps-toggle-btn" id="gps-toggle-btn" onclick="toggleGPS()">開啟</button>
      </div>
      <div class="mb" id="status-msg">開啟 GPS 後帶著手機走路，自動累積公尺數！</div>
      <div class="br">
        <button class="y" onclick="doTrain()">⚔ 訓練</button>
        <button class="y" onclick="doPlay()">♪ 玩耍</button>
      </div>
    </div>

    <!-- 背包 tab -->
    <div id="tab-bag" class="tab-content">
      <div class="st">背包道具</div>
      <div class="bg-g" id="bag-grid"></div>
      <div class="mb" id="bag-msg">選擇道具使用！</div>
    </div>

    <!-- 對戰 tab -->
    <div id="tab-battle" class="tab-content">
      <div class="st">選擇對手</div>
      <div id="enemy-list" style="display:flex;flex-direction:column;gap:7px;"></div>
      <div class="mb" id="battle-msg">選擇對手開始！</div>
    </div>

    <!-- 進化 tab -->
    <div id="tab-evolve" class="tab-content">
      <div class="st">進化路線</div>
      <div class="eg" id="evo-list"></div>
      <div class="mb" id="evo-msg">達成條件即可進化！</div>
      <div class="br s">
        <button class="g" onclick="doEvolve()" id="evo-btn" disabled style="font-size:13px;padding:14px;">★ 進化！</button>
      </div>
    </div>

  </div>

  <div class="bot-nav">
    <div class="nav-tab active" onclick="showTab('status')">狀態</div>
    <div class="nav-tab" onclick="showTab('bag')">背包</div>
    <div class="nav-tab" onclick="showTab('battle')">對戰</div>
    <div class="nav-tab" onclick="showTab('evolve')">進化</div>
  </div>
</div>

<div id="battle-screen" class="screen">
  <div class="ba">
    <svg class="abg" id="arena-bg-svg" viewBox="0 0 320 195" preserveAspectRatio="xMidYMid slice"></svg>
    <div class="fw" id="fw-my">
      <div class="hs"><div class="hi mh" id="my-hp-inner" style="width:100%"></div></div>
      <div class="ss2"><div class="si2" id="my-sp-inner" style="width:0%"></div></div>
      <svg id="my-fighter-svg" class="fsv" viewBox="0 0 100 100"></svg>
      <div class="fl" id="my-fighter-label">我方</div>
    </div>
    <div class="fw" id="fw-en">
      <div class="hs"><div class="hi eh" id="en-hp-inner" style="width:100%"></div></div>
      <div class="ss2" style="opacity:0.4;"><div class="si2" id="en-sp-inner" style="width:0%"></div></div>
      <svg id="en-fighter-svg" class="fsv" viewBox="0 0 100 100"></svg>
      <div class="fl" id="en-fighter-label">敵方</div>
    </div>
    <div class="efx" id="effect-layer"></div>
  </div>
  <div class="bl" id="battle-log"></div>
  <div class="bbt" id="battle-btns">
    <button onclick="battleAction('attack')" id="btn-attack">⚔ 攻擊</button>
    <button class="p" onclick="battleAction('special')" id="btn-special">★ 必殺<br><span id="sp-charge-text" style="font-size:7px;color:#aa66cc;">0/5</span></button>
  </div>
  <div class="br s" id="flee-btn-wrap">
    <button class="r" onclick="fleeBattle()" style="font-size:11px;padding:12px;">↩ 逃跑</button>
  </div>
</div>

<div id="result-screen" class="screen">
  <div class="rt" id="result-title">勝利！</div>
  <svg id="result-sprite" class="rs2" viewBox="0 0 100 100"></svg>
  <div class="rst" id="result-stats"></div>
  <button class="g" onclick="backToMain()" style="font-size:12px;padding:14px;max-width:300px;">▶ 繼續冒險</button>
</div>

</div>
<script>
// ===== 場景 =====
const BG={
grassland:`<rect width="320" height="195" fill="#4a8a3a"/><rect y="125" width="320" height="70" fill="#3a6a2a"/><rect y="118" width="320" height="10" fill="#5aaa4a"/><ellipse cx="60" cy="70" rx="35" ry="25" fill="#fff" opacity="0.7"/><ellipse cx="215" cy="52" rx="29" ry="19" fill="#fff" opacity="0.6"/><circle cx="96" cy="25" r="12" fill="#ffee44" opacity="0.9"/>`,

function ld(){try{const d=localStorage.getItem(K);if(d){const p=JSON.parse(d);if(p&&p.monId&&MONS[p.monId]){G=p;['sp','hunger','mood'].forEach(k=>{if(G[k]==null)G[k]=k==='sp'?0:80;});if(!G.bag)G.bag={meat:3,snack:3,potion:2,vitamin:1};if(!G.lastSeen)G.lastSeen=Date.now();document.getElementById("save-status").textContent="✓ 找到存檔！";return true;}}}catch(e){}return false;}
function newGame(){stopGPS();try{localStorage.removeItem(K);}catch(e){}G=dG();document.getElementById("save-status").textContent="已重置";}

// ===== GPS 追蹤系統 =====
const MAX_SPEED_MPS = 20000/3600; // 20 km/h → m/s（超過就過濾）
let gpsWatchId=null, lastPos=null, gpsRunning=false, sessionMeters=0;

function gpsDistMeters(lat1,lon1,lat2,lon2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function toggleGPS(){
  if(gpsRunning) stopGPS();
  else startGPS();
}

function startGPS(){
  if(!navigator.geolocation){
    setGPSUI('error','GPS 不支援','此裝置無法使用 GPS');
    return;
  }
  setGPSUI('searching','定位中...','等待 GPS 訊號...');
  gpsWatchId=navigator.geolocation.watchPosition(
    onGPSSuccess,
    onGPSError,
    {enableHighAccuracy:true, maximumAge:5000, timeout:15000}
  );
  gpsRunning=true;
  document.getElementById("gps-toggle-btn").textContent="關閉";
  document.getElementById("gps-toggle-btn").classList.add("on");
}

function stopGPS(){
  if(gpsWatchId!==null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;}
  gpsRunning=false;lastPos=null;
  setGPSUI('off','GPS 已關閉','今日：'+G.steps+' 公尺');
  document.getElementById("gps-toggle-btn").textContent="開啟";
  document.getElementById("gps-toggle-btn").classList.remove("on");
}

function onGPSSuccess(pos){
  const {latitude:lat,longitude:lon,accuracy} = pos.coords;
  const now=Date.now();

  // 精度太差（> 50公尺誤差）跳過
  if(accuracy>50){
    setGPSUI('searching','訊號弱（精度'+Math.round(accuracy)+'m）','等待更好訊號...');
    return;
  }
  setGPSUI('active','GPS 運作中（精度'+Math.round(accuracy)+'m）','今日：'+G.steps+' 公尺');

  if(lastPos){
    const dist=gpsDistMeters(lastPos.lat,lastPos.lon,lat,lon);
    const timeSec=(now-lastPos.time)/1000;
    const speed=timeSec>0?dist/timeSec:0;

    // 速度過濾：超過 10 km/h 不計算
    if(speed<=MAX_SPEED_MPS && dist>=1){
      const meters=Math.round(dist);
      G.steps+=meters;
      sessionMeters+=meters;
      // 每 100 公尺加一點 XP 和心情
      const xpGain=Math.floor(meters/10);
      const moodGain=Math.floor(meters/50);
      if(xpGain>0){G.xp+=xpGain;bEl();}
      if(moodGain>0)G.mood=Math.min(100,G.mood+moodGain);
      G.sp=Math.min(SPM,G.sp+Math.floor(meters/200));
      rf();
      document.getElementById("gps-meter").textContent='今日：'+G.steps+' 公尺（+'+meters+'m）';
      sv();
    }
  }
  lastPos={lat,lon,time:now};
}

function onGPSError(err){
  const msgs={1:'請允許定位權限',2:'無法取得位置',3:'GPS 逾時'};
  setGPSUI('error',msgs[err.code]||'GPS 錯誤','請檢查設定後重試');
  gpsRunning=false;
  document.getElementById("gps-toggle-btn").textContent="開啟";
  document.getElementById("gps-toggle-btn").classList.remove("on");
}

function setGPSUI(state,status,meter){
  const dot=document.getElementById("gps-dot");
  dot.className='gps-dot '+(state==='active'?'active':state==='searching'?'searching':state==='error'?'error':'');
  document.getElementById("gps-status").textContent=status;
  document.getElementById("gps-meter").textContent=meter;
}

// ===== 時間消耗 =====
function dec(){
  const now=Date.now(),h=Math.min((now-G.lastSeen)/3600000,24);
  if(h<0.05)return null;
  const hl=Math.round(h*HPH),ml=Math.round(h*MPH);
  G.hunger=Math.max(0,G.hunger-hl);G.mood=Math.max(0,G.mood-ml);
  if(G.hunger===0)G.hp=Math.max(1,G.hp-Math.round(h*HPHP));
  G.lastSeen=now;return{mins:Math.round(h*60),hl,ml};
}

// ===== 核心函式 =====
function mn(){return MONS[G.monId];}
function ss(id,h){const e=document.getElementById(id);if(e)e.innerHTML=h;}
function m(id,t){const e=document.getElementById(id);if(e)e.textContent=t;}
function an(c){const s=document.getElementById("my-sprite");if(!s)return;s.classList.remove("shake","happy");void s.offsetWidth;s.classList.add(c);}
function uLcd(){const e=document.getElementById("lcd-bg-svg");if(e)e.innerHTML=LCDBG[MSC[G.monId]||"grassland"];}

function startGame(){
  const d=dec();
  document.getElementById("title-screen").classList.remove("active");
  document.getElementById("main-screen").classList.add("active");
  rf();bEn();bEl();bBag();
  // 更新 GPS 公尺顯示
  document.getElementById("gps-meter").textContent='今日：'+G.steps+' 公尺';
  if(d&&d.mins>2){
    let t="離開了 "+d.mins+" 分鐘";
    if(d.hl>0)t+="，飽食-"+d.hl;if(d.ml>0)t+="，心情-"+d.ml;
    if(G.hunger===0)t+="，餓太久HP下降！";
    m("status-msg",t);sv();
  }
}
function showMain(){
  ["battle-screen","result-screen"].forEach(id=>document.getElementById(id).classList.remove("active"));
  document.getElementById("main-screen").classList.add("active");
  rf();bEl();
}
function backToMain(){showMain();}
function showTab(t){
  document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"));
  document.getElementById("tab-"+t).classList.add("active");
  document.querySelectorAll(".nav-tab").forEach((el,i)=>{el.classList.toggle("active",["status","bag","battle","evolve"][i]===t);});
  if(t==="evolve")bEl();if(t==="bag")bBag();
}
function rf(){
  const mo=mn();
  ss("my-sprite",mo.svg);document.getElementById("my-sprite").className="mon-svg";
  m("my-name",mo.name);m("stage-label",mo.stage);
  document.getElementById("stat-lv").textContent=mo.lv+Math.floor(G.xp/30);
  document.getElementById("stat-atk").textContent=mo.atk+G.wins*2;
  document.getElementById("stat-win").textContent=G.wins;
  document.getElementById("stat-steps").textContent=G.steps;
  const hp=Math.round(G.hp/G.maxHp*100);
  const hb=document.getElementById("hp-bar");
  hb.style.width=hp+"%";hb.style.background=hp<=25?"#ff4444":hp<=50?"#ffaa22":"#44ff88";
  document.getElementById("hp-text").textContent=G.hp+"/"+G.maxHp;
  document.getElementById("hunger-bar").style.width=G.hunger+"%";document.getElementById("hunger-text").textContent=G.hunger+"/100";
  document.getElementById("mood-bar").style.width=G.mood+"%";document.getElementById("mood-text").textContent=G.mood+"/100";
  document.getElementById("xp-bar").style.width=Math.min(100,Math.round(G.xp/mo.xpNeeded*100))+"%";
  document.getElementById("sp-bar").style.width=Math.round(G.sp/SPM*100)+"%";
  document.getElementById("sp-text").textContent=G.sp+"/"+SPM+(G.sp>=SPM?" ★":"");
  document.getElementById("warn-hunger").style.display=G.hunger<25?"block":"none";
  document.getElementById("warn-mood").style.display=G.mood<25?"block":"none";
  uLcd();
}
function doTrain(){
  if(G.hp<G.maxHp*0.15){m("status-msg","HP太低！先用急救藥！");return;}
  if(G.hunger<15){m("status-msg","肚子太餓！先去背包餵食！");return;}
  const g=Math.floor(Math.random()*8+5);
  G.xp+=g;G.hp=Math.max(1,G.hp-Math.floor(G.maxHp*0.1));
  G.hunger=Math.max(0,G.hunger-10);G.mood=Math.min(100,G.mood+5);G.sp=Math.min(SPM,G.sp+1);
  m("status-msg","訓練完成！+"+g+" EXP");an("shake");rf();bEl();sv();
}
function doPlay(){
  G.mood=Math.min(100,G.mood+20);G.hunger=Math.max(0,G.hunger-5);G.sp=Math.min(SPM,G.sp+1);
  m("status-msg","玩耍完！心情+20");an("happy");rf();sv();
}
function bBag(){const el=document.getElementById("bag-grid");if(!el)return;el.innerHTML="";Object.entries(ITS).forEach(([k,it])=>{const cnt=G.bag[k]||0,d=document.createElement("div");d.className="bc";d.innerHTML=`<div class="bi">${it.icon}</div><div class="bn">${it.name}</div><div class="bd">${it.desc}</div><button class="ib" style="width:100%;" ${cnt<=0?"disabled":""} onclick="uI('${k}')">使用</button>`;el.appendChild(d);});}
function uI(k){if(!G.bag[k]||G.bag[k]<=0){m("bag-msg","道具不夠了！");return;}G.bag[k]--;ITS[k].ef();rf();bBag();sv();}
function bEn(){const el=document.getElementById("enemy-list");el.innerHTML="";ENS.forEach((e,i)=>{const b=document.createElement("button");b.className="eb";b.innerHTML=(e.lv<=mn().lv+3?"⚔":"☠")+" <b>"+e.name+"</b>　LV:"+e.lv+"　ATK:"+e.atk+"　HP:"+e.hp;b.onclick=()=>sB(i);el.appendChild(b);});}
function bEl(){const el=document.getElementById("evo-list");el.innerHTML="";const ps=EP[G.monId]||[];const mo=mn();const ok=G.xp>=mo.xpNeeded;if(!ps.length){el.innerHTML='<div style="font-size:9px;color:#446688;grid-column:1/-1;text-align:center;padding:14px;">已達最終形態</div>';document.getElementById("evo-btn").disabled=true;m("evo-msg","已是最強形態！");return;}ps.forEach(pid=>{const pm=MONS[pid],c=document.createElement("div");c.className="ec";c.innerHTML='<div style="display:flex;justify-content:center;"><svg viewBox="0 0 100 100" width="56" height="56">'+pm.svg+'</svg></div><div class="en">'+pm.name+'</div><div class="er">需 '+mo.xpNeeded+' EXP</div>';c.onclick=()=>{document.querySelectorAll(".ec").forEach(x=>x.classList.remove("sel"));c.classList.add("sel");document.getElementById("evo-btn").disabled=!ok;};el.appendChild(c);});m("evo-msg",ok?"條件達成！選擇目標！":"需 "+mo.xpNeeded+" EXP，目前 "+Math.floor(G.xp));document.getElementById("evo-btn").disabled=true;}
function doEvolve(){const sel=document.querySelector(".ec.sel");if(!sel){m("evo-msg","請先選擇目標！");return;}const ps=EP[G.monId];const tid=ps[Array.from(document.querySelectorAll(".ec")).indexOf(sel)];const tm=MONS[tid];G.monId=tid;G.hp=tm.hp;G.maxHp=tm.hp;G.xp=0;G.hunger=80;G.mood=90;showTab("status");m("status-msg","恭喜！進化為「"+tm.name+"」！");rf();bEn();bEl();sv();}

// ===== 戰鬥 =====
let B={};const SPB=5;
function efx(tp,sd){const el=document.getElementById("effect-layer");const mp={slash:{e:"⚡",a:"sa 0.5s ease-out forwards"},boom:{e:"💥",a:"ba2 0.6s ease-out forwards"},special:{e:"🌟",a:"spa 0.8s ease-out forwards"},hit:{e:"✨",a:"ha 0.4s ease-out forwards"}};const ef=mp[tp];if(!ef)return;el.textContent=ef.e;el.style.opacity="0";el.style.animation="none";void el.offsetWidth;el.style.justifyContent=sd==="right"?"flex-end":"flex-start";el.style.paddingLeft=sd==="left"?"28px":"0";el.style.paddingRight=sd==="right"?"28px":"0";el.style.animation=ef.a;}
function af(id,a2,dur){const el=document.getElementById(id);if(!el)return;el.style.animation=a2+" "+dur+"s ease-in-out";setTimeout(()=>{el.style.animation="";},dur*1000);}
function hff(id){const el=document.getElementById(id);if(!el)return;el.style.animation="hf 0.5s ease-in-out";setTimeout(()=>{el.style.animation="";},500);}
function sBt(en){document.getElementById("btn-attack").disabled=!en;uSP();}
function uSP(){const btn=document.getElementById("btn-special");btn.disabled=(B.over||B.busy||B.sp<SPB);document.getElementById("sp-charge-text").textContent=(B.sp||0)+"/"+SPB;document.getElementById("my-sp-inner").style.width=Math.min(100,Math.round((B.sp||0)/SPB*100))+"%";}
function uBrs(){document.getElementById("my-hp-inner").style.width=Math.max(0,Math.round(B.mHp/B.mMaxHp*100))+"%";document.getElementById("en-hp-inner").style.width=Math.max(0,Math.round(B.eHp/B.eMaxHp*100))+"%";document.getElementById("en-sp-inner").style.width=Math.min(100,Math.round((B.eSp||0)/SPB*100))+"%";uSP();}
function blog(t){const el=document.getElementById("battle-log");el.textContent+=t+"\n";el.scrollTop=el.scrollHeight;}
function sB(idx){if(G.hunger<10){m("battle-msg","太餓了！先去背包餵食！");return;}const en=ENS[idx];B={idx,eHp:en.hp,eMaxHp:en.hp,mHp:G.hp,mMaxHp:G.maxHp,sp:G.sp,eSp:0,over:false,busy:false};document.getElementById("main-screen").classList.remove("active");document.getElementById("battle-screen").classList.add("active");ss("my-fighter-svg",mn().svg);ss("en-fighter-svg",en.svg);document.getElementById("my-fighter-label").textContent=mn().name;document.getElementById("en-fighter-label").textContent=en.name;document.getElementById("my-hp-inner").style.width=Math.round(G.hp/G.maxHp*100)+"%";document.getElementById("en-hp-inner").style.width="100%";document.getElementById("battle-log").textContent="";document.getElementById("battle-btns").style.display="grid";document.getElementById("flee-btn-wrap").style.display="block";sBt(true);const bg=document.getElementById("arena-bg-svg");if(bg)bg.innerHTML=BG[ESC[idx]||"grassland"];blog("⚔ "+mn().name+" VS "+en.name);if(G.hp<G.maxHp)blog("我方HP："+G.hp+"/"+G.maxHp);uBrs();}
function sR(win,en,xp){document.getElementById("battle-screen").classList.remove("active");document.getElementById("result-screen").classList.add("active");const t=document.getElementById("result-title");t.textContent=win?"✨ 勝利！":"💀 敗北...";t.className="rt "+(win?"rw":"rl");document.getElementById("result-sprite").innerHTML=mn().svg;document.getElementById("result-stats").innerHTML=win?"對手："+en.name+"\n獲得EXP：+"+xp+"\nHP："+G.hp+"/"+G.maxHp+"\n飽食："+G.hunger+"\n心情："+G.mood+"\n總勝場："+G.wins:"對手："+en.name+"\nHP剩："+G.hp+"/"+G.maxHp+"\n先去背包恢復再挑戰！";}
function battleAction(type){if(B.over||B.busy)return;if(type==="special"&&B.sp<SPB){blog("必殺能量不足！");return;}B.busy=true;sBt(false);const en=ENS[B.idx],myAtk=mn().atk+G.wins*2;let dmg;if(type==="special"){dmg=Math.floor(myAtk*(2.2+Math.random()*0.6));B.sp=0;}else{dmg=Math.floor(myAtk*(0.7+Math.random()*0.6));B.sp=Math.min(SPB,B.sp+1);}af("fw-my","mya",0.35);setTimeout(()=>{efx(type==="special"?"special":"slash","right");hff("en-fighter-svg");B.eHp-=dmg;uBrs();blog((type==="special"?"🌟 必殺！":"⚔ 攻擊")+"→ 敵-"+dmg);if(B.eHp<=0){B.over=true;G.wins++;const xp=Math.floor(en.lv*8+20);G.xp+=xp;G.hp=B.mHp;G.sp=B.sp;G.mood=Math.min(100,G.mood+15);G.hunger=Math.max(0,G.hunger-15);efx("boom","right");document.getElementById("battle-btns").style.display="none";document.getElementById("flee-btn-wrap").style.display="none";setTimeout(()=>{sR(true,en,xp);bEl();sv();},1200);return;}setTimeout(()=>{af("fw-en","ena",0.35);setTimeout(()=>{B.eSp=Math.min(SPB,B.eSp+1);let ed;if(B.eSp>=SPB){ed=Math.floor(en.atk*(2.0+Math.random()*0.5));B.eSp=0;efx("special","left");blog("😈 敵必殺！→ 我-"+ed);}else{ed=Math.floor(en.atk*(0.7+Math.random()*0.6));efx("hit","left");blog("💢 反擊！→ 我-"+ed);}hff("my-fighter-svg");B.mHp-=ed;uBrs();if(B.mHp<=0){B.over=true;G.hp=Math.max(1,Math.floor(G.maxHp*0.1));G.sp=0;G.mood=Math.max(0,G.mood-20);document.getElementById("battle-btns").style.display="none";document.getElementById("flee-btn-wrap").style.display="none";setTimeout(()=>{sR(false,en,0);sv();},1200);return;}B.busy=false;sBt(true);},250);},500);},300);}
function fleeBattle(){G.hp=B.mHp;G.sp=B.sp;showMain();m("status-msg","逃跑成功！");sv();}
ld();
</script>
